<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Reduced motion icon — 16×16 pixel art, motion lines with cancel -->
  <!-- Lines: #aaccee light blue, Cancel: #d42020 red -->
  <rect width="16" height="16" fill="none"/>
  <!-- Motion arc (3 curved lines suggesting movement) -->
  <!-- Inner arc -->
  <rect x="4" y="6" width="1" height="4" fill="#aaccee"/>
  <rect x="5" y="5" width="1" height="1" fill="#aaccee"/>
  <rect x="5" y="10" width="1" height="1" fill="#aaccee"/>
  <!-- Middle arc -->
  <rect x="7" y="4" width="1" height="8" fill="#aaccee"/>
  <rect x="8" y="3" width="1" height="1" fill="#aaccee"/>
  <rect x="8" y="12" width="1" height="1" fill="#aaccee"/>
  <!-- Outer arc -->
  <rect x="10" y="5" width="1" height="6" fill="#aaccee"/>
  <rect x="11" y="4" width="1" height="1" fill="#aaccee"/>
  <rect x="11" y="11" width="1" height="1" fill="#aaccee"/>
  <!-- Center dot (object) -->
  <rect x="2" y="7" width="2" height="2" fill="#50a8e8"/>
  <!-- Cancel / slash -->
  <rect x="1" y="13" width="1" height="1" fill="#d42020"/>
  <rect x="2" y="12" width="1" height="1" fill="#d42020"/>
  <rect x="3" y="11" width="1" height="1" fill="#d42020"/>
  <rect x="4" y="10" width="1" height="1" fill="#d42020"/>
  <rect x="5" y="9" width="1" height="1" fill="#d42020"/>
  <rect x="6" y="8" width="1" height="1" fill="#d42020"/>
  <rect x="7" y="7" width="1" height="1" fill="#d42020"/>
  <rect x="8" y="6" width="1" height="1" fill="#d42020"/>
  <rect x="9" y="5" width="1" height="1" fill="#d42020"/>
  <rect x="10" y="4" width="1" height="1" fill="#d42020"/>
  <rect x="11" y="3" width="1" height="1" fill="#d42020"/>
  <rect x="12" y="2" width="1" height="1" fill="#d42020"/>
  <rect x="13" y="1" width="1" height="1" fill="#d42020"/>
</svg>
