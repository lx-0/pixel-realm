<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Keyboard navigation icon — 16×16 pixel art, keyboard with focus ring -->
  <!-- Body: #2b2b2b dark, Keys: #6e6e6e gray, Focus: #50a8e8 blue, Border: #0d0d0d -->
  <rect width="16" height="16" fill="none"/>
  <!-- Keyboard body -->
  <rect x="1" y="4" width="14" height="8" fill="#2b2b2b"/>
  <rect x="1" y="4" width="14" height="1" fill="#0d0d0d"/>
  <rect x="1" y="11" width="14" height="1" fill="#0d0d0d"/>
  <rect x="1" y="4" width="1" height="8" fill="#0d0d0d"/>
  <rect x="14" y="4" width="1" height="8" fill="#0d0d0d"/>
  <!-- Top row keys -->
  <rect x="2" y="5" width="2" height="1" fill="#6e6e6e"/>
  <rect x="5" y="5" width="2" height="1" fill="#6e6e6e"/>
  <rect x="8" y="5" width="2" height="1" fill="#6e6e6e"/>
  <rect x="11" y="5" width="2" height="1" fill="#6e6e6e"/>
  <!-- Middle row keys -->
  <rect x="3" y="7" width="2" height="1" fill="#6e6e6e"/>
  <rect x="6" y="7" width="2" height="1" fill="#6e6e6e"/>
  <rect x="9" y="7" width="2" height="1" fill="#6e6e6e"/>
  <!-- Space bar -->
  <rect x="4" y="9" width="8" height="1" fill="#6e6e6e"/>
  <!-- Focus ring highlight on one key (Tab key, top-left) -->
  <rect x="2" y="5" width="2" height="1" fill="#50a8e8"/>
  <!-- Focus ring glow around highlighted key -->
  <rect x="1" y="5" width="1" height="1" fill="#50a8e8" opacity="0.4"/>
  <rect x="4" y="5" width="1" height="1" fill="#50a8e8" opacity="0.4"/>
  <rect x="2" y="4" width="2" height="1" fill="#50a8e8" opacity="0.4"/>
  <rect x="2" y="6" width="2" height="1" fill="#50a8e8" opacity="0.4"/>
  <!-- Arrow keys indicator (bottom right) -->
  <rect x="12" y="8" width="1" height="1" fill="#ffd700"/>
  <rect x="11" y="9" width="1" height="1" fill="#ffd700"/>
  <rect x="12" y="9" width="1" height="1" fill="#ffd700"/>
  <rect x="13" y="9" width="1" height="1" fill="#ffd700"/>
</svg>
