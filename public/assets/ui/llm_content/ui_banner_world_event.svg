<svg xmlns="http://www.w3.org/2000/svg" width="240" height="24" viewBox="0 0 240 24" style="image-rendering: pixelated;">
  <!-- World Event Notification Banner — top-of-screen announcement bar -->
  <!-- Master palette: dark base with gold trim, icon slot left, text area center -->

  <!-- Banner shadow -->
  <rect x="2" y="2" width="238" height="22" fill="#0d0d0d" opacity="0.4"/>

  <!-- Main banner body (dark gradient) -->
  <rect x="0" y="0" width="240" height="22" fill="#2b2b2b"/>
  <rect x="0" y="0" width="240" height="1" fill="#4a4a4a"/>

  <!-- Gold border trim (top and bottom) -->
  <rect x="0" y="0" width="240" height="1" fill="#e8b800"/>
  <rect x="0" y="21" width="240" height="1" fill="#a87000"/>
  <!-- Side gold accents -->
  <rect x="0" y="0" width="1" height="22" fill="#e8b800"/>
  <rect x="239" y="0" width="1" height="22" fill="#a87000"/>

  <!-- Left decorative corner -->
  <rect x="1" y="1" width="3" height="3" fill="#e8b800"/>
  <rect x="2" y="2" width="1" height="1" fill="#ffe040"/>
  <!-- Right decorative corner -->
  <rect x="236" y="1" width="3" height="3" fill="#e8b800"/>
  <rect x="237" y="2" width="1" height="1" fill="#ffe040"/>

  <!-- Left diamond ornament -->
  <rect x="6" y="9" width="4" height="4" fill="#e8b800" transform="rotate(45 8 11)"/>
  <rect x="5" y="10" width="6" height="2" fill="#e8b800"/>
  <rect x="7" y="8" width="2" height="6" fill="#e8b800"/>
  <rect x="7" y="10" width="2" height="2" fill="#ffe040"/>

  <!-- Icon slot (16x16 area for event type icon) -->
  <rect x="16" y="3" width="16" height="16" fill="#3b2010"/>
  <rect x="17" y="4" width="14" height="14" fill="#4a4a4a"/>
  <!-- Icon slot border -->
  <rect x="16" y="3" width="16" height="1" fill="#a87000"/>
  <rect x="16" y="18" width="16" height="1" fill="#6b3a1f"/>

  <!-- Text area (center region) -->
  <!-- Event title placeholder -->
  <rect x="38" y="5" width="80" height="2" fill="#ffe040"/>
  <!-- Event description placeholder -->
  <rect x="38" y="10" width="160" height="1" fill="#c8c8c8"/>
  <rect x="38" y="14" width="140" height="1" fill="#969696"/>

  <!-- Right diamond ornament -->
  <rect x="229" y="10" width="6" height="2" fill="#e8b800"/>
  <rect x="231" y="8" width="2" height="6" fill="#e8b800"/>
  <rect x="231" y="10" width="2" height="2" fill="#ffe040"/>

  <!-- Urgency pulse indicator dots (right side) -->
  <rect x="220" y="7" width="2" height="2" fill="#d42020"/>
  <rect x="220" y="13" width="2" height="2" fill="#d42020"/>
  <rect x="224" y="10" width="2" height="2" fill="#f06020"/>
</svg>
