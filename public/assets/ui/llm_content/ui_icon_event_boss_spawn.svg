<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- World Event Icon: Boss Spawn — skull with horns, menacing red -->
  <rect width="16" height="16" fill="none"/>

  <!-- Dark aura -->
  <rect x="3" y="4" width="10" height="10" fill="#5a0a0a"/>
  <rect x="2" y="5" width="12" height="8" fill="#5a0a0a"/>

  <!-- Skull -->
  <rect x="4" y="5" width="8" height="8" fill="#f0f0f0"/>
  <rect x="3" y="6" width="10" height="6" fill="#f0f0f0"/>
  <!-- Skull top -->
  <rect x="5" y="4" width="6" height="2" fill="#f0f0f0"/>
  <!-- Skull shade -->
  <rect x="4" y="11" width="8" height="1" fill="#c8c8c8"/>

  <!-- Eye sockets (glowing red) -->
  <rect x="5" y="7" width="2" height="2" fill="#0d0d0d"/>
  <rect x="9" y="7" width="2" height="2" fill="#0d0d0d"/>
  <!-- Red eye glow -->
  <rect x="5" y="7" width="1" height="1" fill="#d42020"/>
  <rect x="9" y="7" width="1" height="1" fill="#d42020"/>

  <!-- Nose hole -->
  <rect x="7" y="9" width="2" height="1" fill="#c8c8c8"/>

  <!-- Jaw/teeth -->
  <rect x="5" y="11" width="6" height="2" fill="#f0f0f0"/>
  <rect x="5" y="11" width="1" height="2" fill="#c8c8c8"/>
  <rect x="7" y="11" width="1" height="2" fill="#c8c8c8"/>
  <rect x="9" y="11" width="1" height="2" fill="#c8c8c8"/>

  <!-- Horns -->
  <rect x="2" y="3" width="2" height="3" fill="#a01010"/>
  <rect x="1" y="2" width="2" height="2" fill="#d42020"/>
  <rect x="1" y="1" width="1" height="2" fill="#f06020"/>
  <rect x="12" y="3" width="2" height="3" fill="#a01010"/>
  <rect x="13" y="2" width="2" height="2" fill="#d42020"/>
  <rect x="14" y="1" width="1" height="2" fill="#f06020"/>

  <!-- Danger glow particles -->
  <rect x="0" y="6" width="1" height="1" fill="#d42020"/>
  <rect x="15" y="6" width="1" height="1" fill="#d42020"/>
  <rect x="7" y="14" width="2" height="1" fill="#a01010"/>
</svg>
