<svg xmlns="http://www.w3.org/2000/svg" width="80" height="40" viewBox="0 0 80 40" style="image-rendering: pixelated;">
  <!-- Dialogue Bubble: Normal — standard white speech bubble -->
  <!-- Outer border -->
  <rect x="2" y="0" width="76" height="30" fill="#2b2b2b"/>
  <rect x="0" y="2" width="80" height="26" fill="#2b2b2b"/>
  <!-- Inner fill -->
  <rect x="3" y="1" width="74" height="28" fill="#f0f0f0"/>
  <rect x="1" y="3" width="78" height="24" fill="#f0f0f0"/>
  <!-- Inner border line -->
  <rect x="4" y="2" width="72" height="1" fill="#c8c8c8"/>
  <rect x="4" y="27" width="72" height="1" fill="#c8c8c8"/>
  <rect x="2" y="4" width="1" height="22" fill="#c8c8c8"/>
  <rect x="77" y="4" width="1" height="22" fill="#c8c8c8"/>

  <!-- Speech tail (bottom left) -->
  <rect x="12" y="30" width="6" height="2" fill="#2b2b2b"/>
  <rect x="10" y="32" width="6" height="2" fill="#2b2b2b"/>
  <rect x="8" y="34" width="4" height="2" fill="#2b2b2b"/>
  <!-- Tail fill -->
  <rect x="13" y="30" width="4" height="2" fill="#f0f0f0"/>
  <rect x="11" y="32" width="4" height="2" fill="#f0f0f0"/>
  <rect x="9" y="34" width="2" height="2" fill="#f0f0f0"/>

  <!-- Text placeholder lines -->
  <rect x="8" y="8" width="60" height="1" fill="#4a4a4a"/>
  <rect x="8" y="13" width="56" height="1" fill="#4a4a4a"/>
  <rect x="8" y="18" width="48" height="1" fill="#4a4a4a"/>
</svg>
