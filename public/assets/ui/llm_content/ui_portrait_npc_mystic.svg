<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" style="image-rendering: pixelated;">
  <!-- NPC Portrait: Mystic — hooded robe, glowing eyes, magical -->
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" fill="#1a0a3a"/>
  <!-- Background magic sparkles -->
  <rect x="4" y="4" width="1" height="1" fill="#d090ff"/>
  <rect x="26" y="6" width="1" height="1" fill="#d090ff"/>
  <rect x="6" y="28" width="1" height="1" fill="#9050e0"/>
  <rect x="24" y="26" width="1" height="1" fill="#9050e0"/>

  <!-- Shoulders (dark robe) -->
  <rect x="4" y="24" width="24" height="8" fill="#5a20a0"/>
  <rect x="6" y="24" width="20" height="8" fill="#5a20a0"/>
  <!-- Robe runes -->
  <rect x="8" y="28" width="2" height="1" fill="#d090ff"/>
  <rect x="14" y="30" width="2" height="1" fill="#d090ff"/>
  <rect x="22" y="28" width="2" height="1" fill="#d090ff"/>
  <!-- Amulet -->
  <rect x="14" y="25" width="4" height="4" fill="#9050e0"/>
  <rect x="15" y="26" width="2" height="2" fill="#d090ff"/>

  <!-- Hood -->
  <rect x="6" y="4" width="20" height="20" fill="#5a20a0"/>
  <rect x="8" y="2" width="16" height="6" fill="#5a20a0"/>
  <!-- Hood opening / face shadow -->
  <rect x="10" y="10" width="12" height="14" fill="#1a0a3a"/>
  <rect x="9" y="12" width="14" height="10" fill="#1a0a3a"/>
  <!-- Hood edge highlight -->
  <rect x="8" y="6" width="1" height="16" fill="#9050e0"/>
  <rect x="23" y="6" width="1" height="16" fill="#9050e0"/>
  <rect x="10" y="3" width="12" height="1" fill="#9050e0"/>

  <!-- Face (pale, mysterious) -->
  <rect x="11" y="12" width="10" height="10" fill="#c8c8c8"/>
  <rect x="12" y="11" width="8" height="12" fill="#c8c8c8"/>

  <!-- Glowing eyes -->
  <rect x="12" y="15" width="3" height="2" fill="#9050e0"/>
  <rect x="13" y="15" width="1" height="1" fill="#d090ff"/>
  <rect x="17" y="15" width="3" height="2" fill="#9050e0"/>
  <rect x="18" y="15" width="1" height="1" fill="#d090ff"/>
  <!-- Eye glow effect -->
  <rect x="11" y="14" width="1" height="1" fill="#9050e0" opacity="0.5"/>
  <rect x="20" y="14" width="1" height="1" fill="#9050e0" opacity="0.5"/>

  <!-- Nose (subtle) -->
  <rect x="15" y="18" width="2" height="1" fill="#969696"/>

  <!-- Thin lips -->
  <rect x="14" y="20" width="4" height="1" fill="#969696"/>

  <!-- Mystical energy wisps -->
  <rect x="8" y="22" width="2" height="1" fill="#d090ff"/>
  <rect x="22" y="20" width="2" height="1" fill="#d090ff"/>
  <rect x="10" y="24" width="1" height="1" fill="#9050e0"/>
</svg>
