<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Emotion icon: Angry — red tint, furrowed brows -->
  <rect x="4" y="2" width="8" height="12" rx="0" fill="#f06020"/>
  <rect x="3" y="4" width="10" height="8" fill="#f06020"/>
  <rect x="2" y="5" width="12" height="6" fill="#f06020"/>
  <!-- Furrowed brows -->
  <rect x="4" y="4" width="3" height="1" fill="#5a0a0a"/>
  <rect x="9" y="4" width="3" height="1" fill="#5a0a0a"/>
  <rect x="5" y="3" width="1" height="1" fill="#5a0a0a"/>
  <rect x="10" y="3" width="1" height="1" fill="#5a0a0a"/>
  <!-- Eyes (narrow, angry) -->
  <rect x="5" y="6" width="2" height="1" fill="#3b2010"/>
  <rect x="9" y="6" width="2" height="1" fill="#3b2010"/>
  <!-- Frown -->
  <rect x="5" y="10" width="6" height="1" fill="#3b2010"/>
  <rect x="4" y="11" width="1" height="1" fill="#3b2010"/>
  <rect x="11" y="11" width="1" height="1" fill="#3b2010"/>
  <!-- Red tint on forehead -->
  <rect x="5" y="2" width="6" height="1" fill="#d42020"/>
</svg>
