<svg xmlns="http://www.w3.org/2000/svg" width="80" height="40" viewBox="0 0 80 40" style="image-rendering: pixelated;">
  <!-- Dialogue Bubble: Lore — purple/magic bordered, mystical feel -->
  <!-- Outer border (deep purple) -->
  <rect x="2" y="0" width="76" height="30" fill="#1a0a3a"/>
  <rect x="0" y="2" width="80" height="26" fill="#1a0a3a"/>
  <!-- Inner purple border -->
  <rect x="3" y="1" width="74" height="28" fill="#5a20a0"/>
  <rect x="1" y="3" width="78" height="24" fill="#5a20a0"/>
  <!-- Inner fill (dark parchment) -->
  <rect x="4" y="2" width="72" height="26" fill="#2b2b2b"/>
  <rect x="2" y="4" width="76" height="22" fill="#2b2b2b"/>
  <!-- Magic glow line (top) -->
  <rect x="5" y="3" width="70" height="1" fill="#9050e0"/>
  <!-- Magic glow line (bottom) -->
  <rect x="5" y="26" width="70" height="1" fill="#9050e0"/>

  <!-- Speech tail (bottom left, purple border) -->
  <rect x="12" y="30" width="6" height="2" fill="#1a0a3a"/>
  <rect x="10" y="32" width="6" height="2" fill="#1a0a3a"/>
  <rect x="8" y="34" width="4" height="2" fill="#1a0a3a"/>
  <!-- Tail fill -->
  <rect x="13" y="30" width="4" height="2" fill="#2b2b2b"/>
  <rect x="11" y="32" width="4" height="2" fill="#2b2b2b"/>
  <rect x="9" y="34" width="2" height="2" fill="#2b2b2b"/>

  <!-- Arcane rune decorations (corners) -->
  <!-- Top-left rune -->
  <rect x="5" y="5" width="1" height="3" fill="#d090ff"/>
  <rect x="6" y="4" width="3" height="1" fill="#d090ff"/>
  <rect x="6" y="8" width="2" height="1" fill="#d090ff"/>
  <!-- Top-right rune -->
  <rect x="74" y="5" width="1" height="3" fill="#d090ff"/>
  <rect x="71" y="4" width="3" height="1" fill="#d090ff"/>
  <rect x="72" y="8" width="2" height="1" fill="#d090ff"/>
  <!-- Bottom-left rune -->
  <rect x="5" y="20" width="1" height="3" fill="#9050e0"/>
  <rect x="6" y="23" width="2" height="1" fill="#9050e0"/>
  <!-- Bottom-right rune -->
  <rect x="74" y="20" width="1" height="3" fill="#9050e0"/>
  <rect x="72" y="23" width="2" height="1" fill="#9050e0"/>

  <!-- Magic sparkle particles -->
  <rect x="20" y="6" width="1" height="1" fill="#d090ff"/>
  <rect x="40" y="4" width="1" height="1" fill="#9050e0"/>
  <rect x="60" y="6" width="1" height="1" fill="#d090ff"/>

  <!-- Text placeholder lines (light on dark bg) -->
  <rect x="10" y="8" width="56" height="1" fill="#c8c8c8"/>
  <rect x="10" y="13" width="52" height="1" fill="#969696"/>
  <rect x="10" y="18" width="44" height="1" fill="#969696"/>
</svg>
