<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- World Event Icon: Storm — dark cloud, lightning bolt -->
  <rect width="16" height="16" fill="none"/>

  <!-- Storm cloud -->
  <rect x="2" y="2" width="12" height="6" fill="#4a4a4a"/>
  <rect x="1" y="3" width="14" height="4" fill="#4a4a4a"/>
  <rect x="3" y="1" width="4" height="2" fill="#4a4a4a"/>
  <rect x="8" y="1" width="4" height="2" fill="#6e6e6e"/>
  <!-- Cloud highlights -->
  <rect x="3" y="2" width="3" height="1" fill="#6e6e6e"/>
  <rect x="9" y="1" width="2" height="1" fill="#969696"/>
  <!-- Cloud dark underside -->
  <rect x="2" y="7" width="12" height="1" fill="#2b2b2b"/>

  <!-- Lightning bolt -->
  <rect x="7" y="8" width="3" height="1" fill="#ffe040"/>
  <rect x="6" y="9" width="3" height="1" fill="#ffe040"/>
  <rect x="7" y="10" width="3" height="1" fill="#ffe040"/>
  <rect x="8" y="11" width="2" height="1" fill="#ffe040"/>
  <rect x="7" y="12" width="2" height="1" fill="#ffe040"/>
  <rect x="6" y="13" width="2" height="1" fill="#ffe040"/>
  <!-- Lightning highlight -->
  <rect x="7" y="9" width="1" height="1" fill="#fff8a0"/>
  <rect x="8" y="11" width="1" height="1" fill="#fff8a0"/>
  <!-- Lightning glow -->
  <rect x="5" y="10" width="1" height="1" fill="#e8b800" opacity="0.5"/>
  <rect x="10" y="10" width="1" height="1" fill="#e8b800" opacity="0.5"/>

  <!-- Rain drops -->
  <rect x="2" y="9" width="1" height="2" fill="#50a8e8"/>
  <rect x="4" y="10" width="1" height="2" fill="#50a8e8"/>
  <rect x="11" y="9" width="1" height="2" fill="#50a8e8"/>
  <rect x="13" y="10" width="1" height="2" fill="#50a8e8"/>
  <rect x="3" y="13" width="1" height="2" fill="#2a7ac0"/>
  <rect x="12" y="12" width="1" height="2" fill="#2a7ac0"/>
</svg>
