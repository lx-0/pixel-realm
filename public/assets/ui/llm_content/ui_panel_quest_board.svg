<svg xmlns="http://www.w3.org/2000/svg" width="160" height="128" viewBox="0 0 160 128" style="image-rendering: pixelated;">
  <!-- Quest Board UI Panel — town bulletin board for LLM-generated quests -->
  <!-- Master palette: wood browns, gold accents, parchment sand -->

  <!-- Outer wooden frame -->
  <rect x="0" y="0" width="160" height="128" fill="#3b2010"/>
  <!-- Inner wooden frame -->
  <rect x="2" y="2" width="156" height="124" fill="#6b3a1f"/>
  <!-- Wood grain horizontal lines -->
  <rect x="2" y="6" width="156" height="1" fill="#8b5c2a"/>
  <rect x="2" y="14" width="156" height="1" fill="#8b5c2a"/>
  <rect x="2" y="122" width="156" height="1" fill="#8b5c2a"/>
  <rect x="2" y="114" width="156" height="1" fill="#8b5c2a"/>

  <!-- Top header bar (darker wood) -->
  <rect x="4" y="4" width="152" height="14" fill="#3b2010"/>
  <!-- Header text area highlight -->
  <rect x="6" y="6" width="148" height="10" fill="#6b3a1f"/>
  <!-- "QUESTS" title decoration — gold lettering hint -->
  <rect x="56" y="7" width="4" height="8" fill="#e8b800"/>
  <rect x="62" y="7" width="4" height="8" fill="#e8b800"/>
  <rect x="68" y="7" width="4" height="8" fill="#e8b800"/>
  <rect x="74" y="7" width="4" height="8" fill="#e8b800"/>
  <rect x="80" y="7" width="4" height="8" fill="#e8b800"/>
  <rect x="86" y="7" width="4" height="8" fill="#e8b800"/>
  <!-- Title underline -->
  <rect x="54" y="16" width="40" height="1" fill="#e8b800"/>

  <!-- Cork board interior -->
  <rect x="6" y="20" width="148" height="100" fill="#b8843f"/>
  <!-- Cork texture dots -->
  <rect x="10" y="24" width="2" height="2" fill="#d4a85a"/>
  <rect x="30" y="30" width="2" height="2" fill="#d4a85a"/>
  <rect x="50" y="26" width="2" height="2" fill="#d4a85a"/>
  <rect x="80" y="22" width="2" height="2" fill="#d4a85a"/>
  <rect x="120" y="28" width="2" height="2" fill="#d4a85a"/>
  <rect x="140" y="24" width="2" height="2" fill="#d4a85a"/>
  <rect x="20" y="100" width="2" height="2" fill="#d4a85a"/>
  <rect x="60" y="108" width="2" height="2" fill="#d4a85a"/>
  <rect x="100" y="104" width="2" height="2" fill="#d4a85a"/>
  <rect x="130" y="110" width="2" height="2" fill="#d4a85a"/>

  <!-- Quest slot 1 (parchment pinned to board) -->
  <rect x="10" y="24" width="44" height="40" fill="#e8d08a"/>
  <rect x="11" y="25" width="42" height="38" fill="#e8d08a"/>
  <!-- Pin on slot 1 -->
  <rect x="30" y="22" width="4" height="4" fill="#d42020"/>
  <rect x="31" y="23" width="2" height="2" fill="#f06020"/>
  <!-- Quest text lines (slot 1) -->
  <rect x="14" y="30" width="36" height="1" fill="#6b3a1f"/>
  <rect x="14" y="34" width="32" height="1" fill="#6b3a1f"/>
  <rect x="14" y="38" width="28" height="1" fill="#6b3a1f"/>
  <rect x="14" y="42" width="34" height="1" fill="#6b3a1f"/>
  <!-- Quest priority marker (gold star) -->
  <rect x="14" y="54" width="4" height="4" fill="#ffe040"/>
  <rect x="15" y="53" width="2" height="1" fill="#ffe040"/>
  <rect x="13" y="55" width="1" height="2" fill="#ffe040"/>
  <rect x="19" y="55" width="1" height="2" fill="#ffe040"/>

  <!-- Quest slot 2 -->
  <rect x="58" y="26" width="44" height="40" fill="#e8d08a"/>
  <!-- Pin on slot 2 -->
  <rect x="78" y="24" width="4" height="4" fill="#d42020"/>
  <rect x="79" y="25" width="2" height="2" fill="#f06020"/>
  <!-- Quest text lines (slot 2) -->
  <rect x="62" y="32" width="36" height="1" fill="#6b3a1f"/>
  <rect x="62" y="36" width="30" height="1" fill="#6b3a1f"/>
  <rect x="62" y="40" width="34" height="1" fill="#6b3a1f"/>
  <rect x="62" y="44" width="26" height="1" fill="#6b3a1f"/>

  <!-- Quest slot 3 -->
  <rect x="106" y="22" width="44" height="40" fill="#e8d08a"/>
  <!-- Pin on slot 3 -->
  <rect x="126" y="20" width="4" height="4" fill="#d42020"/>
  <rect x="127" y="21" width="2" height="2" fill="#f06020"/>
  <!-- Quest text lines (slot 3) -->
  <rect x="110" y="28" width="36" height="1" fill="#6b3a1f"/>
  <rect x="110" y="32" width="28" height="1" fill="#6b3a1f"/>
  <rect x="110" y="36" width="32" height="1" fill="#6b3a1f"/>
  <rect x="110" y="40" width="36" height="1" fill="#6b3a1f"/>

  <!-- Quest slot 4 (bottom row) -->
  <rect x="10" y="72" width="44" height="40" fill="#e8d08a"/>
  <!-- Pin on slot 4 -->
  <rect x="30" y="70" width="4" height="4" fill="#2a7ac0"/>
  <rect x="31" y="71" width="2" height="2" fill="#50a8e8"/>
  <!-- Quest text lines (slot 4) -->
  <rect x="14" y="78" width="36" height="1" fill="#6b3a1f"/>
  <rect x="14" y="82" width="30" height="1" fill="#6b3a1f"/>
  <rect x="14" y="86" width="34" height="1" fill="#6b3a1f"/>

  <!-- Quest slot 5 -->
  <rect x="58" y="74" width="44" height="40" fill="#e8d08a"/>
  <!-- Pin on slot 5 -->
  <rect x="78" y="72" width="4" height="4" fill="#2a7ac0"/>
  <rect x="79" y="73" width="2" height="2" fill="#50a8e8"/>
  <!-- Quest text lines (slot 5) -->
  <rect x="62" y="80" width="36" height="1" fill="#6b3a1f"/>
  <rect x="62" y="84" width="28" height="1" fill="#6b3a1f"/>
  <rect x="62" y="88" width="32" height="1" fill="#6b3a1f"/>

  <!-- Quest slot 6 -->
  <rect x="106" y="70" width="44" height="40" fill="#e8d08a"/>
  <!-- Pin on slot 6 -->
  <rect x="126" y="68" width="4" height="4" fill="#9050e0"/>
  <rect x="127" y="69" width="2" height="2" fill="#d090ff"/>
  <!-- Quest text lines (slot 6) -->
  <rect x="110" y="76" width="36" height="1" fill="#6b3a1f"/>
  <rect x="110" y="80" width="30" height="1" fill="#6b3a1f"/>
  <rect x="110" y="84" width="34" height="1" fill="#6b3a1f"/>

  <!-- Corner nails -->
  <rect x="2" y="2" width="3" height="3" fill="#4a4a4a"/>
  <rect x="3" y="3" width="1" height="1" fill="#969696"/>
  <rect x="155" y="2" width="3" height="3" fill="#4a4a4a"/>
  <rect x="156" y="3" width="1" height="1" fill="#969696"/>
  <rect x="2" y="123" width="3" height="3" fill="#4a4a4a"/>
  <rect x="3" y="124" width="1" height="1" fill="#969696"/>
  <rect x="155" y="123" width="3" height="3" fill="#4a4a4a"/>
  <rect x="156" y="124" width="1" height="1" fill="#969696"/>
</svg>
