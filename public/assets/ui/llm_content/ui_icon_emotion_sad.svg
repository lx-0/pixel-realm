<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Emotion icon: Sad — blue tint, downturned mouth -->
  <rect x="4" y="2" width="8" height="12" rx="0" fill="#2a7ac0"/>
  <rect x="3" y="4" width="10" height="8" fill="#2a7ac0"/>
  <rect x="2" y="5" width="12" height="6" fill="#2a7ac0"/>
  <!-- Drooping brows -->
  <rect x="4" y="4" width="3" height="1" fill="#0a1a3a"/>
  <rect x="9" y="4" width="3" height="1" fill="#0a1a3a"/>
  <rect x="4" y="3" width="1" height="1" fill="#0a1a3a"/>
  <rect x="11" y="3" width="1" height="1" fill="#0a1a3a"/>
  <!-- Eyes (droopy) -->
  <rect x="5" y="6" width="2" height="2" fill="#0a1a3a"/>
  <rect x="9" y="6" width="2" height="2" fill="#0a1a3a"/>
  <!-- Tear drop -->
  <rect x="11" y="8" width="1" height="2" fill="#90d0f8"/>
  <rect x="11" y="10" width="1" height="1" fill="#c8f0ff"/>
  <!-- Frown -->
  <rect x="6" y="10" width="4" height="1" fill="#0a1a3a"/>
  <rect x="5" y="11" width="1" height="1" fill="#0a1a3a"/>
  <rect x="10" y="11" width="1" height="1" fill="#0a1a3a"/>
</svg>
