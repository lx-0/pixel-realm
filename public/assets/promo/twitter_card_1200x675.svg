<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#0d1028"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d6e2d"/>
      <stop offset="35%" stop-color="#b8843f"/>
      <stop offset="65%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#90d0f8"/>
    </linearGradient>
    <linearGradient id="bannerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8b800" stop-opacity="0"/>
      <stop offset="20%" stop-color="#e8b800"/>
      <stop offset="80%" stop-color="#e8b800"/>
      <stop offset="100%" stop-color="#e8b800" stop-opacity="0"/>
    </linearGradient>
  </defs>

