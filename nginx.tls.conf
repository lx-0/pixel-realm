# nginx TLS reverse proxy for PixelRealm (production)
#
# Terminates HTTPS and WSS, then proxies to internal Docker services:
#   https://yourdomain.com           → client (static SPA)
#   https://yourdomain.com/auth/*    → game-server auth (port 3001)
#   wss://yourdomain.com/colyseus    → game-server WebSocket (port 2567)
#
# Prerequisites:
#   1. Obtain a certificate with certbot (Let's Encrypt):
#        certbot certonly --standalone -d yourdomain.com
#   2. Certificates are expected at:
#        /etc/letsencrypt/live/yourdomain.com/fullchain.pem
#        /etc/letsencrypt/live/yourdomain.com/privkey.pem
#   3. Replace all occurrences of "yourdomain.com" with your actual domain.
#
# Mount this file into the nginx container:
#   volumes:
#     - ./nginx.tls.conf:/etc/nginx/conf.d/default.conf:ro
#     - /etc/letsencrypt:/etc/letsencrypt:ro

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com;

    # Allow Let's Encrypt ACME challenges through (needed for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS + WSS main server ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name yourdomain.com;

    # ── TLS certificates (Let's Encrypt) ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Modern TLS settings (A+ grade on SSL Labs)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── WebSocket upgrade support ────────────────────────────────────────────
    # Colyseus game server WebSocket — proxied at /colyseus
    # Client connects to wss://yourdomain.com/colyseus
    location /colyseus {
        proxy_pass         http://game-server:2567;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Auth API ─────────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass         http://game-server:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Game server REST API ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://game-server:2567/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Static SPA client ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://client:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Health check (bypass proxy for nginx-level liveness) ────────────────
    location /nginx-health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
