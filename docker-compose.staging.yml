version: "3.9"

# Staging docker-compose for PixelRealm
# Mirrors production topology without TLS (TLS terminates at the host's
# existing reverse proxy in staging, or is simply omitted for internal QA).
#
# Usage:
#   docker compose -f docker-compose.staging.yml up --build
#
# Environment:
#   Copy .env.staging.example to .env.staging and fill in values, then:
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pixelrealm_staging}
      POSTGRES_USER: ${POSTGRES_USER:-pixelrealm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pixelrealm} -d ${POSTGRES_DB:-pixelrealm_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  game-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 2567
      AUTH_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-pixelrealm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pixelrealm_staging}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    ports:
      - "${GAME_PORT:-2567}:2567"
      - "${AUTH_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2567/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend
      - frontend

  client:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Use ws:// (non-TLS) for staging; override via VITE_COLYSEUS_URL in .env.staging
        VITE_COLYSEUS_URL: ${VITE_COLYSEUS_URL:-ws://localhost:2567}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8080}:80"
    depends_on:
      game-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - frontend

networks:
  backend:
  frontend:

volumes:
  postgres_staging_data:
  redis_staging_data:
