<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" style="font-family: monospace; image-rendering: pixelated;">
  <rect width="600" height="400" fill="#1a1a1a"/>
  <text x="16" y="24" fill="#f0f0f0" font-size="13" font-weight="bold">PixelRealm — Color Language (Gameplay Semantics)</text>

  <!-- Row headers -->
  <text x="16" y="50" fill="#6e6e6e" font-size="9">COLOR</text>
  <text x="120" y="50" fill="#6e6e6e" font-size="9">ROLE</text>
  <text x="300" y="50" fill="#6e6e6e" font-size="9">EXAMPLES</text>

  <!-- Player / Friendly -->
  <rect x="16" y="56" width="80" height="28" fill="#50a8e8" rx="2"/>
  <text x="16" y="99" fill="#50a8e8" font-size="8">#50a8e8 Cyan</text>
  <text x="120" y="68" fill="#f0f0f0" font-size="10" font-weight="bold">Player / Friendly</text>
  <text x="120" y="80" fill="#969696" font-size="9">Player sprite, healer NPCs, safe zones</text>

  <!-- Enemy / Danger -->
  <rect x="16" y="108" width="40" height="28" fill="#d42020" rx="2"/>
  <rect x="60" y="108" width="40" height="28" fill="#f06020" rx="2"/>
  <text x="16" y="150" fill="#d42020" font-size="8">#d42020</text>
  <text x="60" y="150" fill="#f06020" font-size="8">#f06020</text>
  <text x="120" y="120" fill="#f0f0f0" font-size="10" font-weight="bold">Enemy / Danger</text>
  <text x="120" y="132" fill="#969696" font-size="9">Enemy sprites, lava tiles, trap markers</text>

  <!-- Health / Nature -->
  <rect x="16" y="160" width="40" height="28" fill="#4c9b4c" rx="2"/>
  <rect x="60" y="160" width="40" height="28" fill="#78c878" rx="2"/>
  <text x="16" y="202" fill="#4c9b4c" font-size="8">#4c9b4c</text>
  <text x="60" y="202" fill="#78c878" font-size="8">#78c878</text>
  <text x="120" y="172" fill="#f0f0f0" font-size="10" font-weight="bold">Health / Nature / Loot</text>
  <text x="120" y="184" fill="#969696" font-size="9">HP bar, healing items, loot drop sparkles</text>

  <!-- Quest / Rarity / XP -->
  <rect x="16" y="212" width="40" height="28" fill="#e8b800" rx="2"/>
  <rect x="60" y="212" width="40" height="28" fill="#ffe040" rx="2"/>
  <text x="16" y="254" fill="#e8b800" font-size="8">#e8b800</text>
  <text x="60" y="254" fill="#ffe040" font-size="8">#ffe040</text>
  <text x="120" y="224" fill="#f0f0f0" font-size="10" font-weight="bold">Quest / Rarity / XP</text>
  <text x="120" y="236" fill="#969696" font-size="9">Quest markers, rare item glow, XP orbs, NFT shimmer</text>

  <!-- Magic / Mana -->
  <rect x="16" y="264" width="40" height="28" fill="#9050e0" rx="2"/>
  <rect x="60" y="264" width="40" height="28" fill="#d090ff" rx="2"/>
  <text x="16" y="306" fill="#9050e0" font-size="8">#9050e0</text>
  <text x="60" y="306" fill="#d090ff" font-size="8">#d090ff</text>
  <text x="120" y="276" fill="#f0f0f0" font-size="10" font-weight="bold">Magic / Mana</text>
  <text x="120" y="288" fill="#969696" font-size="9">Mana bar, spell VFX, enchanted tiles</text>

  <!-- Neutral terrain -->
  <rect x="16" y="316" width="40" height="28" fill="#6e6e6e" rx="2"/>
  <rect x="60" y="316" width="40" height="28" fill="#8b5c2a" rx="2"/>
  <text x="16" y="358" fill="#6e6e6e" font-size="8">#6e6e6e</text>
  <text x="60" y="358" fill="#8b5c2a" font-size="8">#8b5c2a</text>
  <text x="120" y="328" fill="#f0f0f0" font-size="10" font-weight="bold">Neutral Terrain</text>
  <text x="120" y="340" fill="#969696" font-size="9">Ground tiles, stone walls, rocks, paths</text>

  <text x="16" y="384" fill="#4a4a4a" font-size="9">Rule: Color + Silhouette shape must always convey role. Never rely on color alone.</text>
</svg>
