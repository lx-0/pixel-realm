<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" style="font-family: monospace; image-rendering: pixelated;">
  <rect width="640" height="480" fill="#1a1a1a"/>
  <text x="16" y="24" fill="#f0f0f0" font-size="13" font-weight="bold">PixelRealm — Character Spritesheet Template (16×24 px per frame)</text>
  <text x="16" y="40" fill="#6e6e6e" font-size="9">4 columns (directions) × 5 animation rows. Each cell = 16×24 px. Display scale ×3 = 48×72 px.</text>

  <!-- Column headers -->
  <text x="80"  y="62" fill="#50a8e8" font-size="9" text-anchor="middle">DOWN</text>
  <text x="160" y="62" fill="#50a8e8" font-size="9" text-anchor="middle">LEFT</text>
  <text x="240" y="62" fill="#50a8e8" font-size="9" text-anchor="middle">RIGHT</text>
  <text x="320" y="62" fill="#50a8e8" font-size="9" text-anchor="middle">UP</text>

  <!-- Row labels -->
  <text x="16" y="98"  fill="#969696" font-size="8">IDLE</text>
  <text x="16" y="98"  fill="#969696" font-size="7">  2fr</text>
  <text x="16" y="170" fill="#969696" font-size="8">WALK</text>
  <text x="16" y="170" fill="#969696" font-size="7">  4fr</text>
  <text x="16" y="266" fill="#969696" font-size="8">ATTACK</text>
  <text x="16" y="266" fill="#969696" font-size="7">  6fr</text>
  <text x="16" y="386" fill="#969696" font-size="8">CAST</text>
  <text x="16" y="386" fill="#969696" font-size="7">  8fr</text>
  <text x="16" y="434" fill="#969696" font-size="8">DEATH</text>
  <text x="16" y="434" fill="#969696" font-size="7">  6fr</text>

  <!-- Grid: cols at x=48, 128, 208, 288. Each cell 80×96 (16×24 scaled ×5 for visibility) -->
  <!-- Cell size in SVG: 80 wide x 96 tall per frame (5x scale for readability) -->

  <!-- Idle row (y=68, height=96) -->
  <!-- Walk row (y=164, height=96*2=192 for 4 frames... actually rows are per animation, cols are per direction -->
  <!-- Let me do a cleaner grid: each frame box is 72x96 in SVG (displayed) -->

  <!-- Using: frame box = 64w x 96h in SVG, starting at x=48 -->
  <!-- 4 directions side by side, then show frame count via lighter boxes -->

  <!-- Direction boxes - one box per direction, stacked rows per animation -->
  <!-- Idle: 2 frames wide, Walk: 4, Attack: 6, Cast: 8, Death: 6 -->
  <!-- I'll do per-direction column, showing all frames for that animation -->

  <!-- Simplified: show one column per direction, one row per animation. Each cell shows the frame count as sub-cells -->

  <defs>
    <pattern id="pixel-grid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#2b2b2b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Idle row: y=68 to y=164 (96px = 24 game pixels at 4x) -->
  <!-- Let's just draw labeled frame boxes -->

  <!-- IDLE row y=70 -->
  <rect x="48" y="70" width="560" height="72" fill="#1a1a1a" stroke="#2b2b2b" stroke-width="1"/>
  <!-- 4 directions, each showing 2 idle frames, 64px wide per frame -->
  <!-- DOWN: frames at x=48, x=112 -->
  <rect x="48"  y="70" width="64" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="112" y="70" width="64" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <text x="80"  y="110" fill="#2d6e2d" font-size="8" text-anchor="middle">fr0</text>
  <text x="144" y="110" fill="#2d6e2d" font-size="8" text-anchor="middle">fr1</text>
  <!-- LEFT -->
  <rect x="192" y="70" width="64" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="256" y="70" width="64" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <text x="224" y="110" fill="#2d6e2d" font-size="8" text-anchor="middle">fr0</text>
  <text x="288" y="110" fill="#2d6e2d" font-size="8" text-anchor="middle">fr1</text>
  <!-- RIGHT -->
  <rect x="336" y="70" width="64" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="400" y="70" width="64" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <text x="368" y="110" fill="#2d6e2d" font-size="8" text-anchor="middle">fr0</text>
  <text x="432" y="110" fill="#2d6e2d" font-size="8" text-anchor="middle">fr1</text>
  <!-- UP -->
  <rect x="480" y="70" width="64" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="544" y="70" width="64" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <text x="512" y="110" fill="#2d6e2d" font-size="8" text-anchor="middle">fr0</text>
  <text x="576" y="110" fill="#2d6e2d" font-size="8" text-anchor="middle">fr1</text>

  <!-- WALK row y=150, 4 frames per direction -->
  <rect x="48" y="150" width="560" height="72" fill="#1a1a1a" stroke="#2b2b2b" stroke-width="1"/>
  <!-- DOWN 4 frames, 32px each to fit all 4 in 128px space... use 128px per direction = 32px per frame -->
  <!-- Actually layout: 4 dirs × 4 frames × 32px = 512px. Starting at 48. -->
  <rect x="48"  y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="80"  y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="112" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="144" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <text x="112" y="230" fill="#2d6e2d" font-size="7" text-anchor="middle">DOWN (4fr)</text>

  <rect x="192" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="224" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="256" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="288" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <text x="256" y="230" fill="#2d6e2d" font-size="7" text-anchor="middle">LEFT (4fr)</text>

  <rect x="336" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="368" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="400" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="432" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <text x="400" y="230" fill="#2d6e2d" font-size="7" text-anchor="middle">RIGHT (4fr)</text>

  <rect x="480" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="512" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="544" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <rect x="576" y="150" width="32" height="72" fill="#0d0d0d" stroke="#2d6e2d" stroke-width="1"/>
  <text x="544" y="230" fill="#2d6e2d" font-size="7" text-anchor="middle">UP (4fr)</text>

  <!-- Info boxes -->
  <rect x="48" y="248" width="560" height="32" fill="#0d0d0d" stroke="#4a4a4a" stroke-width="1"/>
  <text x="328" y="265" fill="#969696" font-size="9" text-anchor="middle">ATTACK row — 6 frames per direction (similar layout to WALK but wider)</text>
  <rect x="48" y="292" width="560" height="32" fill="#0d0d0d" stroke="#4a4a4a" stroke-width="1"/>
  <text x="328" y="309" fill="#969696" font-size="9" text-anchor="middle">CAST row — 8 frames per direction</text>
  <rect x="48" y="336" width="560" height="32" fill="#0d0d0d" stroke="#4a4a4a" stroke-width="1"/>
  <text x="328" y="353" fill="#969696" font-size="9" text-anchor="middle">DEATH row — 6 frames per direction (hold last frame)</text>

  <!-- Scale reference -->
  <rect x="48"  y="390" width="16" height="24" fill="#50a8e8" stroke="#2a7ac0" stroke-width="1"/>
  <text x="70"  y="399" fill="#969696" font-size="8">1:1 (game pixels, 16×24)</text>
  <rect x="180" y="378" width="48" height="72" fill="#50a8e8" stroke="#2a7ac0" stroke-width="1"/>
  <text x="234" y="415" fill="#969696" font-size="8">×3 display (48×72)</text>

  <text x="16" y="468" fill="#4a4a4a" font-size="9">Spritesheet format: PNG, transparent BG. Export at 1:1 — Phaser scales ×3 at runtime.</text>
</svg>
