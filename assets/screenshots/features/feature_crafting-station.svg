      <text x="600" y="500" font-family="monospace" font-size="10" fill="#666">Cost: 5 Gold</text>
    
  <!-- Title banner -->
  <rect x="0" y="620" width="1200" height="55" fill="#000" opacity="0.7"/>
  <text x="24" y="653" font-family="monospace" font-size="22" fill="#aaddaa" font-weight="bold">Crafting & Economy</text>
  <text x="24" y="669" font-family="monospace" font-size="12" fill="#888">Forge weapons, brew potions, enchant gear</text>
