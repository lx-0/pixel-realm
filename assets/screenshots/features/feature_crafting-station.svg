<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" style="image-rendering: pixelated;">
  <defs><style>text { font-family: monospace; }</style></defs>
  <rect width="1200" height="675" fill="#0e1408"/>
  <rect width="1200" height="675" fill="#1b2115" opacity="0.3"/>
  
      <!-- Crafting panel background -->
