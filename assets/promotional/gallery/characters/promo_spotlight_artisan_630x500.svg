    <rect x="324" y="48" width="24" height="6"/>
    <rect x="342" y="54" width="6" height="6"/>
    <rect x="324" y="60" width="24" height="6"/>
  </g>
  <!-- Letter A -->
  <g fill="#ffe040">
    <rect x="360" y="30" width="18" height="6"/>
    <rect x="354" y="36" width="6" height="30"/>
    <rect x="378" y="36" width="6" height="30"/>
    <rect x="360" y="48" width="18" height="6"/>
  </g>
  <!-- Letter N -->
