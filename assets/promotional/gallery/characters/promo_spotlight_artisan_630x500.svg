    <rect x="156" y="420" width="66" height="6" fill="#6b3a1f"/>
    <rect x="234" y="420" width="66" height="6" fill="#6b3a1f"/>
    <rect x="312" y="420" width="66" height="6" fill="#6b3a1f"/>
