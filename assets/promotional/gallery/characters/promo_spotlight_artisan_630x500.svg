  <!-- ==================== TITLE TEXT "ARTISAN" ==================== -->
  <!-- Pixel font "ARTISAN" built from 6px rects -->
  <!-- Centered at top, each letter approx 30px wide, 36px tall, 6px gap -->
  <!-- Total width: 7 letters * 30 + 6 gaps * 6 = 210+36 = 246. Start x = (630-246)/2 = 192 -->

  <!-- Letter A -->
  <g fill="#ffe040">
    <rect x="198" y="30" width="18" height="6"/>
    <rect x="192" y="36" width="6" height="30"/>
    <rect x="216" y="36" width="6" height="30"/>
    <rect x="198" y="48" width="18" height="6"/>
  </g>
  <!-- Letter R -->
