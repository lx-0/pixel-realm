    <rect x="234" y="30" width="18" height="6"/>
    <rect x="252" y="36" width="6" height="12"/>
    <rect x="234" y="48" width="18" height="6"/>
    <rect x="252" y="54" width="6" height="12"/>
  </g>
  <!-- Letter T -->
