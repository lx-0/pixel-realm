    <rect x="360" y="138" width="6" height="66" fill="#4a4a4a"/>
    <rect x="480" y="138" width="6" height="66" fill="#4a4a4a"/>
    <rect x="600" y="138" width="6" height="66" fill="#4a4a4a"/>
    <rect x="60" y="204" width="6" height="66" fill="#4a4a4a"/>
