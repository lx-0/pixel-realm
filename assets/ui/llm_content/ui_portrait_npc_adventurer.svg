<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" style="image-rendering: pixelated;">
  <!-- NPC Portrait: Adventurer — leather armor, scarf, confident -->
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" fill="#6b3a1f"/>

  <!-- Shoulders (leather armor) -->
  <rect x="6" y="26" width="20" height="6" fill="#6b3a1f"/>
  <rect x="8" y="26" width="16" height="6" fill="#8b5c2a"/>
  <!-- Leather straps -->
  <rect x="10" y="26" width="2" height="6" fill="#6b3a1f"/>
  <rect x="20" y="26" width="2" height="6" fill="#6b3a1f"/>
  <!-- Red scarf -->
  <rect x="12" y="24" width="8" height="3" fill="#d42020"/>
  <rect x="10" y="25" width="4" height="4" fill="#a01010"/>
  <rect x="18" y="25" width="4" height="4" fill="#a01010"/>
  <rect x="11" y="26" width="2" height="2" fill="#d42020"/>

  <!-- Head -->
  <rect x="10" y="10" width="12" height="14" fill="#d4a85a"/>
  <rect x="9" y="12" width="14" height="10" fill="#d4a85a"/>
  <!-- Ears -->
  <rect x="8" y="14" width="2" height="4" fill="#d4a85a"/>
  <rect x="22" y="14" width="2" height="4" fill="#d4a85a"/>
  <!-- Earring -->
  <rect x="22" y="17" width="1" height="2" fill="#e8b800"/>

  <!-- Hair (brown, windswept) -->
  <rect x="8" y="6" width="16" height="6" fill="#6b3a1f"/>
  <rect x="10" y="4" width="12" height="4" fill="#6b3a1f"/>
  <!-- Hair flowing right (wind-blown) -->
  <rect x="22" y="8" width="4" height="2" fill="#6b3a1f"/>
  <rect x="24" y="7" width="2" height="2" fill="#8b5c2a"/>
  <!-- Hair highlight -->
  <rect x="12" y="5" width="4" height="1" fill="#8b5c2a"/>
  <!-- Bangs -->
  <rect x="9" y="10" width="4" height="2" fill="#6b3a1f"/>

  <!-- Eyes (determined, bright) -->
  <rect x="12" y="15" width="2" height="2" fill="#2b2b2b"/>
  <rect x="18" y="15" width="2" height="2" fill="#2b2b2b"/>
  <rect x="12" y="15" width="1" height="1" fill="#2a7ac0"/>
  <rect x="18" y="15" width="1" height="1" fill="#2a7ac0"/>

  <!-- Scar on left cheek -->
  <rect x="20" y="18" width="1" height="3" fill="#b8843f"/>

  <!-- Nose -->
  <rect x="15" y="17" width="2" height="2" fill="#b8843f"/>

  <!-- Confident smirk -->
  <rect x="13" y="21" width="5" height="1" fill="#8b5c2a"/>
  <rect x="18" y="20" width="1" height="1" fill="#8b5c2a"/>
</svg>
