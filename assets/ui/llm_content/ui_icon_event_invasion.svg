<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- World Event Icon: Invasion — crossed swords, red danger -->
  <rect width="16" height="16" fill="none"/>
  <!-- Background danger glow -->
  <rect x="4" y="4" width="8" height="8" fill="#5a0a0a"/>
  <rect x="3" y="5" width="10" height="6" fill="#5a0a0a"/>
  <rect x="5" y="3" width="6" height="10" fill="#5a0a0a"/>

  <!-- Sword 1 (diagonal top-left to bottom-right) -->
  <rect x="3" y="3" width="2" height="2" fill="#c8c8c8"/>
  <rect x="5" y="5" width="2" height="2" fill="#c8c8c8"/>
  <rect x="7" y="7" width="2" height="2" fill="#c8c8c8"/>
  <rect x="9" y="9" width="2" height="2" fill="#c8c8c8"/>
  <rect x="11" y="11" width="2" height="2" fill="#c8c8c8"/>
  <!-- Sword 1 hilt -->
  <rect x="2" y="2" width="2" height="2" fill="#a87000"/>
  <rect x="1" y="3" width="1" height="1" fill="#e8b800"/>
  <rect x="3" y="1" width="1" height="1" fill="#e8b800"/>
  <!-- Sword 1 tip -->
  <rect x="12" y="12" width="1" height="1" fill="#f0f0f0"/>

  <!-- Sword 2 (diagonal top-right to bottom-left) -->
  <rect x="11" y="3" width="2" height="2" fill="#c8c8c8"/>
  <rect x="9" y="5" width="2" height="2" fill="#c8c8c8"/>
  <rect x="5" y="9" width="2" height="2" fill="#c8c8c8"/>
  <rect x="3" y="11" width="2" height="2" fill="#c8c8c8"/>
  <!-- Sword 2 hilt -->
  <rect x="12" y="2" width="2" height="2" fill="#a87000"/>
  <rect x="14" y="3" width="1" height="1" fill="#e8b800"/>
  <rect x="12" y="1" width="1" height="1" fill="#e8b800"/>
  <!-- Sword 2 tip -->
  <rect x="3" y="12" width="1" height="1" fill="#f0f0f0"/>

  <!-- Red danger flash at center -->
  <rect x="7" y="7" width="2" height="2" fill="#d42020"/>
</svg>
