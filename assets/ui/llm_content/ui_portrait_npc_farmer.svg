<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" style="image-rendering: pixelated;">
  <!-- NPC Portrait: Farmer — straw hat, tanned, green accent -->
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" fill="#1a3a1a"/>

  <!-- Shoulders (simple tunic) -->
  <rect x="6" y="26" width="20" height="6" fill="#4c9b4c"/>
  <rect x="8" y="26" width="16" height="6" fill="#2d6e2d"/>
  <!-- Overalls strap -->
  <rect x="12" y="26" width="2" height="6" fill="#8b5c2a"/>
  <rect x="18" y="26" width="2" height="6" fill="#8b5c2a"/>
  <!-- Undershirt visible -->
  <rect x="14" y="27" width="4" height="5" fill="#e8d08a"/>

  <!-- Head -->
  <rect x="10" y="10" width="12" height="16" fill="#d4a85a"/>
  <rect x="9" y="12" width="14" height="12" fill="#d4a85a"/>
  <!-- Ears -->
  <rect x="8" y="14" width="2" height="4" fill="#d4a85a"/>
  <rect x="22" y="14" width="2" height="4" fill="#d4a85a"/>

  <!-- Straw hat -->
  <rect x="4" y="8" width="24" height="2" fill="#e8d08a"/>
  <rect x="6" y="6" width="20" height="4" fill="#d4a85a"/>
  <rect x="8" y="4" width="16" height="4" fill="#e8d08a"/>
  <!-- Hat band (red) -->
  <rect x="6" y="8" width="20" height="1" fill="#d42020"/>
  <!-- Hat highlight -->
  <rect x="10" y="5" width="6" height="1" fill="#f0f0f0"/>
  <!-- Straw texture -->
  <rect x="9" y="6" width="2" height="1" fill="#b8843f"/>
  <rect x="15" y="5" width="2" height="1" fill="#b8843f"/>
  <rect x="19" y="6" width="2" height="1" fill="#b8843f"/>

  <!-- Eyes (warm, friendly) -->
  <rect x="12" y="15" width="2" height="2" fill="#6b3a1f"/>
  <rect x="18" y="15" width="2" height="2" fill="#6b3a1f"/>
  <!-- Eye highlights -->
  <rect x="12" y="15" width="1" height="1" fill="#f0f0f0"/>
  <rect x="18" y="15" width="1" height="1" fill="#f0f0f0"/>

  <!-- Freckles (sun spots) -->
  <rect x="10" y="17" width="1" height="1" fill="#b8843f"/>
  <rect x="12" y="18" width="1" height="1" fill="#b8843f"/>
  <rect x="19" y="17" width="1" height="1" fill="#b8843f"/>
  <rect x="21" y="18" width="1" height="1" fill="#b8843f"/>

  <!-- Nose -->
  <rect x="15" y="17" width="2" height="2" fill="#b8843f"/>

  <!-- Big friendly smile -->
  <rect x="12" y="21" width="8" height="1" fill="#8b5c2a"/>
  <rect x="11" y="20" width="1" height="1" fill="#8b5c2a"/>
  <rect x="20" y="20" width="1" height="1" fill="#8b5c2a"/>
  <!-- Teeth hint -->
  <rect x="14" y="21" width="4" height="1" fill="#f0f0f0"/>
</svg>
