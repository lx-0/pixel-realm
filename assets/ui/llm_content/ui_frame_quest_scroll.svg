<svg xmlns="http://www.w3.org/2000/svg" width="120" height="96" viewBox="0 0 120 96" style="image-rendering: pixelated;">
  <!-- Quest Scroll / Parchment Frame — for dynamically generated quest text -->
  <!-- Master palette: parchment sand/gold, wood brown edges -->

  <!-- Shadow behind scroll -->
  <rect x="4" y="4" width="116" height="92" fill="#2b2b2b" opacity="0.3"/>

  <!-- Parchment body -->
  <rect x="2" y="8" width="116" height="80" fill="#e8d08a"/>
  <!-- Darker parchment edge (aged look) -->
  <rect x="2" y="8" width="116" height="2" fill="#d4a85a"/>
  <rect x="2" y="86" width="116" height="2" fill="#d4a85a"/>
  <rect x="2" y="8" width="2" height="80" fill="#d4a85a"/>
  <rect x="116" y="8" width="2" height="80" fill="#d4a85a"/>

  <!-- Top scroll roll -->
  <rect x="0" y="4" width="120" height="8" fill="#b8843f"/>
  <rect x="0" y="4" width="120" height="2" fill="#8b5c2a"/>
  <rect x="0" y="10" width="120" height="2" fill="#8b5c2a"/>
  <!-- Roll highlight -->
  <rect x="0" y="6" width="120" height="2" fill="#d4a85a"/>
  <!-- Roll ends (wooden knobs) -->
  <rect x="0" y="2" width="6" height="12" fill="#6b3a1f"/>
  <rect x="1" y="3" width="4" height="10" fill="#8b5c2a"/>
  <rect x="2" y="5" width="2" height="6" fill="#b8843f"/>
  <rect x="114" y="2" width="6" height="12" fill="#6b3a1f"/>
  <rect x="115" y="3" width="4" height="10" fill="#8b5c2a"/>
  <rect x="116" y="5" width="2" height="6" fill="#b8843f"/>

  <!-- Bottom scroll roll -->
  <rect x="0" y="84" width="120" height="8" fill="#b8843f"/>
  <rect x="0" y="84" width="120" height="2" fill="#8b5c2a"/>
  <rect x="0" y="90" width="120" height="2" fill="#8b5c2a"/>
  <!-- Roll highlight -->
  <rect x="0" y="86" width="120" height="2" fill="#d4a85a"/>
  <!-- Roll ends (wooden knobs) -->
  <rect x="0" y="82" width="6" height="12" fill="#6b3a1f"/>
  <rect x="1" y="83" width="4" height="10" fill="#8b5c2a"/>
  <rect x="2" y="85" width="2" height="6" fill="#b8843f"/>
  <rect x="114" y="82" width="6" height="12" fill="#6b3a1f"/>
  <rect x="115" y="83" width="4" height="10" fill="#8b5c2a"/>
  <rect x="116" y="85" width="2" height="6" fill="#b8843f"/>

  <!-- Inner content area border -->
  <rect x="8" y="16" width="104" height="64" fill="none" stroke="#b8843f" stroke-width="1"/>

  <!-- Quest title area -->
  <rect x="10" y="18" width="100" height="8" fill="none"/>
  <!-- Title text placeholder lines -->
  <rect x="30" y="20" width="60" height="2" fill="#a87000"/>
  <!-- Separator line -->
  <rect x="14" y="28" width="92" height="1" fill="#b8843f"/>

  <!-- Quest body text placeholder lines -->
  <rect x="14" y="34" width="88" height="1" fill="#8b5c2a"/>
  <rect x="14" y="39" width="80" height="1" fill="#8b5c2a"/>
  <rect x="14" y="44" width="84" height="1" fill="#8b5c2a"/>
  <rect x="14" y="49" width="76" height="1" fill="#8b5c2a"/>
  <rect x="14" y="54" width="82" height="1" fill="#8b5c2a"/>

  <!-- Reward section (bottom of parchment) -->
  <rect x="14" y="62" width="92" height="1" fill="#b8843f"/>
  <!-- Gold coin icon hint -->
  <rect x="14" y="66" width="6" height="6" fill="#e8b800"/>
  <rect x="15" y="67" width="4" height="4" fill="#ffe040"/>
  <rect x="16" y="68" width="2" height="2" fill="#fff8a0"/>
  <!-- Reward text placeholder -->
  <rect x="24" y="68" width="40" height="1" fill="#a87000"/>

  <!-- Wax seal (bottom right) -->
  <rect x="90" y="64" width="10" height="10" fill="#a01010"/>
  <rect x="91" y="65" width="8" height="8" fill="#d42020"/>
  <rect x="93" y="67" width="4" height="4" fill="#f06020"/>
  <rect x="94" y="68" width="2" height="2" fill="#f8a060"/>

  <!-- Parchment aging spots -->
  <rect x="20" y="36" width="2" height="1" fill="#d4a85a"/>
  <rect x="70" y="42" width="2" height="1" fill="#d4a85a"/>
  <rect x="50" y="56" width="2" height="1" fill="#d4a85a"/>
  <rect x="90" y="32" width="2" height="1" fill="#d4a85a"/>
</svg>
