<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" style="image-rendering: pixelated;">
  <!-- NPC Portrait: Guard — stern, metal helmet, blue accent (friendly/town) -->
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" fill="#0a1a3a"/>

  <!-- Shoulders (armor) -->
  <rect x="6" y="26" width="20" height="6" fill="#4a4a4a"/>
  <rect x="8" y="26" width="16" height="6" fill="#6e6e6e"/>
  <!-- Shoulder guards -->
  <rect x="4" y="27" width="6" height="4" fill="#4a4a4a"/>
  <rect x="5" y="28" width="4" height="2" fill="#6e6e6e"/>
  <rect x="22" y="27" width="6" height="4" fill="#4a4a4a"/>
  <rect x="23" y="28" width="4" height="2" fill="#6e6e6e"/>
  <!-- Blue tabard visible -->
  <rect x="12" y="28" width="8" height="4" fill="#1a4a8a"/>
  <rect x="14" y="28" width="4" height="4" fill="#2a7ac0"/>

  <!-- Head -->
  <rect x="10" y="12" width="12" height="14" fill="#d4a85a"/>
  <rect x="9" y="14" width="14" height="10" fill="#d4a85a"/>
  <!-- Ear -->
  <rect x="8" y="16" width="2" height="4" fill="#d4a85a"/>
  <rect x="22" y="16" width="2" height="4" fill="#d4a85a"/>

  <!-- Helmet -->
  <rect x="8" y="6" width="16" height="8" fill="#6e6e6e"/>
  <rect x="10" y="4" width="12" height="4" fill="#4a4a4a"/>
  <rect x="12" y="3" width="8" height="3" fill="#6e6e6e"/>
  <!-- Helmet visor ridge -->
  <rect x="8" y="12" width="16" height="2" fill="#4a4a4a"/>
  <!-- Helmet crest -->
  <rect x="14" y="2" width="4" height="3" fill="#2a7ac0"/>
  <rect x="15" y="1" width="2" height="2" fill="#50a8e8"/>
  <!-- Helmet highlight -->
  <rect x="12" y="5" width="6" height="1" fill="#969696"/>
  <rect x="11" y="7" width="2" height="1" fill="#969696"/>

  <!-- Nose guard (vertical) -->
  <rect x="15" y="12" width="2" height="4" fill="#6e6e6e"/>

  <!-- Eyes (stern) -->
  <rect x="11" y="15" width="3" height="2" fill="#2b2b2b"/>
  <rect x="18" y="15" width="3" height="2" fill="#2b2b2b"/>
  <rect x="12" y="15" width="1" height="1" fill="#50a8e8"/>
  <rect x="19" y="15" width="1" height="1" fill="#50a8e8"/>

  <!-- Jaw (square, strong) -->
  <rect x="10" y="22" width="12" height="2" fill="#b8843f"/>

  <!-- Mouth (firm line) -->
  <rect x="13" y="21" width="6" height="1" fill="#8b5c2a"/>

  <!-- Stubble hint -->
  <rect x="11" y="22" width="2" height="1" fill="#b8843f"/>
  <rect x="19" y="22" width="2" height="1" fill="#b8843f"/>
</svg>
