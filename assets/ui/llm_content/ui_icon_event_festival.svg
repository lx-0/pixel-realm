<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- World Event Icon: Festival — festive banner/pennant, bright colors -->
  <rect width="16" height="16" fill="none"/>

  <!-- Pennant pole -->
  <rect x="7" y="1" width="2" height="14" fill="#8b5c2a"/>
  <rect x="7" y="1" width="1" height="14" fill="#b8843f"/>
  <!-- Pole top ornament -->
  <rect x="6" y="0" width="4" height="2" fill="#e8b800"/>
  <rect x="7" y="0" width="2" height="1" fill="#ffe040"/>

  <!-- Left pennant (red/orange) -->
  <rect x="2" y="2" width="5" height="3" fill="#d42020"/>
  <rect x="3" y="5" width="4" height="2" fill="#d42020"/>
  <rect x="4" y="7" width="3" height="2" fill="#f06020"/>
  <rect x="5" y="9" width="2" height="1" fill="#f8a060"/>
  <!-- Left pennant highlight -->
  <rect x="3" y="3" width="2" height="1" fill="#f06020"/>

  <!-- Right pennant (blue/cyan) -->
  <rect x="9" y="3" width="5" height="3" fill="#2a7ac0"/>
  <rect x="9" y="6" width="4" height="2" fill="#2a7ac0"/>
  <rect x="9" y="8" width="3" height="2" fill="#50a8e8"/>
  <rect x="9" y="10" width="2" height="1" fill="#90d0f8"/>
  <!-- Right pennant highlight -->
  <rect x="11" y="4" width="2" height="1" fill="#50a8e8"/>

  <!-- Confetti/sparkle particles -->
  <rect x="1" y="4" width="1" height="1" fill="#ffe040"/>
  <rect x="14" y="2" width="1" height="1" fill="#ffe040"/>
  <rect x="3" y="11" width="1" height="1" fill="#d090ff"/>
  <rect x="12" y="12" width="1" height="1" fill="#78c878"/>
  <rect x="1" y="8" width="1" height="1" fill="#f8a060"/>
  <rect x="14" y="7" width="1" height="1" fill="#d42020"/>

  <!-- Ground/base -->
  <rect x="5" y="14" width="6" height="2" fill="#6b3a1f"/>
  <rect x="6" y="14" width="4" height="1" fill="#8b5c2a"/>
</svg>
