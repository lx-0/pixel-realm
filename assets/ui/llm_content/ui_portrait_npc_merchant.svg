<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" style="image-rendering: pixelated;">
  <!-- NPC Portrait: Merchant — warm earthy tones, hat, friendly face -->
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" fill="#3b2010"/>

  <!-- Neck/shoulders -->
  <rect x="8" y="26" width="16" height="6" fill="#b8843f"/>
  <rect x="6" y="28" width="20" height="4" fill="#8b5c2a"/>
  <!-- Collar (rich fabric) -->
  <rect x="10" y="26" width="12" height="2" fill="#a87000"/>
  <rect x="12" y="26" width="8" height="1" fill="#e8b800"/>

  <!-- Head -->
  <rect x="10" y="10" width="12" height="16" fill="#d4a85a"/>
  <rect x="9" y="12" width="14" height="12" fill="#d4a85a"/>
  <!-- Ear -->
  <rect x="8" y="14" width="2" height="4" fill="#d4a85a"/>
  <rect x="22" y="14" width="2" height="4" fill="#d4a85a"/>

  <!-- Merchant hat (wide brim) -->
  <rect x="6" y="8" width="20" height="2" fill="#6b3a1f"/>
  <rect x="8" y="6" width="16" height="4" fill="#8b5c2a"/>
  <rect x="10" y="4" width="12" height="4" fill="#6b3a1f"/>
  <!-- Hat band -->
  <rect x="8" y="8" width="16" height="1" fill="#e8b800"/>
  <!-- Hat highlight -->
  <rect x="12" y="5" width="4" height="1" fill="#b8843f"/>

  <!-- Eyes (friendly, slightly squinted) -->
  <rect x="12" y="15" width="2" height="2" fill="#3b2010"/>
  <rect x="18" y="15" width="2" height="2" fill="#3b2010"/>
  <!-- Eye highlight -->
  <rect x="12" y="15" width="1" height="1" fill="#f0f0f0"/>
  <rect x="18" y="15" width="1" height="1" fill="#f0f0f0"/>

  <!-- Nose -->
  <rect x="15" y="17" width="2" height="2" fill="#b8843f"/>

  <!-- Smile -->
  <rect x="13" y="21" width="6" height="1" fill="#8b5c2a"/>
  <rect x="12" y="20" width="1" height="1" fill="#8b5c2a"/>
  <rect x="19" y="20" width="1" height="1" fill="#8b5c2a"/>

  <!-- Mustache -->
  <rect x="12" y="19" width="8" height="1" fill="#6b3a1f"/>
  <rect x="11" y="19" width="1" height="2" fill="#6b3a1f"/>
  <rect x="20" y="19" width="1" height="2" fill="#6b3a1f"/>

  <!-- Gold coin on hat (merchant symbol) -->
  <rect x="14" y="6" width="4" height="2" fill="#ffe040"/>
  <rect x="15" y="6" width="2" height="2" fill="#fff8a0"/>
</svg>
