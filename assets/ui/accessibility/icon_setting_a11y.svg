<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Accessibility tab icon — 16×16 pixel art, universal access symbol (person in circle) -->
  <!-- Circle: #50a8e8 player blue, Figure: #f0f0f0 near-white, BG: none -->
  <rect width="16" height="16" fill="none"/>
  <!-- Circle outline -->
  <rect x="5" y="1" width="6" height="1" fill="#50a8e8"/>
  <rect x="3" y="2" width="2" height="1" fill="#50a8e8"/>
  <rect x="11" y="2" width="2" height="1" fill="#50a8e8"/>
  <rect x="2" y="3" width="1" height="2" fill="#50a8e8"/>
  <rect x="13" y="3" width="1" height="2" fill="#50a8e8"/>
  <rect x="1" y="5" width="1" height="6" fill="#50a8e8"/>
  <rect x="14" y="5" width="1" height="6" fill="#50a8e8"/>
  <rect x="2" y="11" width="1" height="2" fill="#50a8e8"/>
  <rect x="13" y="11" width="1" height="2" fill="#50a8e8"/>
  <rect x="3" y="13" width="2" height="1" fill="#50a8e8"/>
  <rect x="11" y="13" width="2" height="1" fill="#50a8e8"/>
  <rect x="5" y="14" width="6" height="1" fill="#50a8e8"/>
  <!-- Person — head -->
  <rect x="7" y="3" width="2" height="2" fill="#f0f0f0"/>
  <!-- Person — arms (outstretched) -->
  <rect x="4" y="6" width="8" height="1" fill="#f0f0f0"/>
  <!-- Person — torso -->
  <rect x="7" y="5" width="2" height="4" fill="#f0f0f0"/>
  <!-- Person — legs -->
  <rect x="5" y="10" width="2" height="2" fill="#f0f0f0"/>
  <rect x="9" y="10" width="2" height="2" fill="#f0f0f0"/>
  <rect x="6" y="9" width="1" height="1" fill="#f0f0f0"/>
  <rect x="9" y="9" width="1" height="1" fill="#f0f0f0"/>
</svg>
