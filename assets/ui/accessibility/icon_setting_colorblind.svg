<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Colorblind mode icon — 16×16 pixel art, eye with color spectrum -->
  <!-- Outline: #0d0d0d, Iris: #50a8e8 player blue, Red: #d42020, Green: #4c9b4c, Sclera: #f0f0f0 -->
  <rect width="16" height="16" fill="none"/>
  <!-- Eye outline (top lid) -->
  <rect x="5" y="3" width="6" height="1" fill="#0d0d0d"/>
  <rect x="4" y="4" width="1" height="1" fill="#0d0d0d"/>
  <rect x="11" y="4" width="1" height="1" fill="#0d0d0d"/>
  <rect x="3" y="5" width="1" height="1" fill="#0d0d0d"/>
  <rect x="12" y="5" width="1" height="1" fill="#0d0d0d"/>
  <rect x="2" y="6" width="1" height="2" fill="#0d0d0d"/>
  <rect x="13" y="6" width="1" height="2" fill="#0d0d0d"/>
  <!-- Eye outline (bottom lid) -->
  <rect x="3" y="8" width="1" height="1" fill="#0d0d0d"/>
  <rect x="12" y="8" width="1" height="1" fill="#0d0d0d"/>
  <rect x="4" y="9" width="1" height="1" fill="#0d0d0d"/>
  <rect x="11" y="9" width="1" height="1" fill="#0d0d0d"/>
  <rect x="5" y="10" width="6" height="1" fill="#0d0d0d"/>
  <!-- Sclera (eye white) -->
  <rect x="5" y="4" width="6" height="1" fill="#f0f0f0"/>
  <rect x="4" y="5" width="8" height="1" fill="#f0f0f0"/>
  <rect x="3" y="6" width="3" height="2" fill="#f0f0f0"/>
  <rect x="10" y="6" width="3" height="2" fill="#f0f0f0"/>
  <rect x="4" y="8" width="2" height="1" fill="#f0f0f0"/>
  <rect x="10" y="8" width="2" height="1" fill="#f0f0f0"/>
  <rect x="5" y="9" width="1" height="1" fill="#f0f0f0"/>
  <rect x="10" y="9" width="1" height="1" fill="#f0f0f0"/>
  <!-- Iris ring — tri-color for colorblind spectrum -->
  <rect x="7" y="5" width="2" height="1" fill="#d42020"/>
  <rect x="6" y="6" width="1" height="2" fill="#d42020"/>
  <rect x="9" y="6" width="1" height="2" fill="#4c9b4c"/>
  <rect x="7" y="8" width="2" height="1" fill="#4c9b4c"/>
  <rect x="7" y="6" width="2" height="1" fill="#50a8e8"/>
  <!-- Pupil -->
  <rect x="7" y="7" width="2" height="1" fill="#0d0d0d"/>
  <!-- Diagonal strike-through line (indicates filter/mode) -->
  <rect x="2" y="11" width="1" height="1" fill="#d42020"/>
  <rect x="3" y="10" width="1" height="1" fill="#d42020"/>
  <rect x="12" y="3" width="1" height="1" fill="#d42020"/>
  <rect x="13" y="2" width="1" height="1" fill="#d42020"/>
</svg>
