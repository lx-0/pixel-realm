<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Sun icon (Day) — 16×16 pixel art, master palette colors only -->
  <!-- Core: #ffe040 bright yellow, Highlight: #fff8a0 pale, Ray tips: #e8b800 gold -->
  <rect width="16" height="16" fill="none"/>
  <!-- Rays (cardinal) -->
  <rect x="7" y="1" width="2" height="2" fill="#e8b800"/>
  <rect x="7" y="13" width="2" height="2" fill="#e8b800"/>
  <rect x="1" y="7" width="2" height="2" fill="#e8b800"/>
  <rect x="13" y="7" width="2" height="2" fill="#e8b800"/>
  <!-- Rays (diagonal) -->
  <rect x="3" y="3" width="2" height="2" fill="#e8b800"/>
  <rect x="11" y="3" width="2" height="2" fill="#e8b800"/>
  <rect x="3" y="11" width="2" height="2" fill="#e8b800"/>
  <rect x="11" y="11" width="2" height="2" fill="#e8b800"/>
  <!-- Sun body outer ring -->
  <rect x="6" y="4" width="4" height="1" fill="#ffe040"/>
  <rect x="6" y="11" width="4" height="1" fill="#ffe040"/>
  <rect x="4" y="6" width="1" height="4" fill="#ffe040"/>
  <rect x="11" y="6" width="1" height="4" fill="#ffe040"/>
  <rect x="5" y="5" width="1" height="1" fill="#ffe040"/>
  <rect x="10" y="5" width="1" height="1" fill="#ffe040"/>
  <rect x="5" y="10" width="1" height="1" fill="#ffe040"/>
  <rect x="10" y="10" width="1" height="1" fill="#ffe040"/>
  <!-- Sun body fill -->
  <rect x="5" y="6" width="6" height="4" fill="#ffe040"/>
  <rect x="6" y="5" width="4" height="6" fill="#ffe040"/>
  <!-- Sun highlight (top-left specular) -->
  <rect x="6" y="6" width="2" height="2" fill="#fff8a0"/>
</svg>
