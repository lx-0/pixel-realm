<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Dusk/Sunset icon — 16×16 pixel art, master palette colors only -->
  <!-- Sun: #f06020 fire orange, Glow: #d42020 bright red, Sky: #5a0a0a deep blood, Horizon: #3b2010 -->
  <rect width="16" height="16" fill="none"/>
  <!-- Sky gradient (deep to warm) -->
  <rect x="0" y="0" width="16" height="1" fill="#0a1a3a"/>
  <rect x="0" y="1" width="16" height="1" fill="#5a0a0a"/>
  <rect x="0" y="2" width="16" height="1" fill="#5a0a0a"/>
  <rect x="0" y="3" width="16" height="1" fill="#a01010"/>
  <!-- Warm glow band -->
  <rect x="0" y="7" width="16" height="1" fill="#d42020"/>
  <rect x="0" y="8" width="16" height="1" fill="#f06020"/>
  <rect x="2" y="6" width="12" height="1" fill="#d42020"/>
  <!-- Half-sun setting (bottom center) -->
  <rect x="6" y="9" width="4" height="1" fill="#f06020"/>
  <rect x="5" y="10" width="6" height="1" fill="#f06020"/>
  <rect x="5" y="11" width="6" height="1" fill="#f8a060"/>
  <!-- Sun highlight -->
  <rect x="6" y="9" width="2" height="1" fill="#f8a060"/>
  <rect x="6" y="10" width="2" height="1" fill="#f8a060"/>
  <!-- Rays -->
  <rect x="7" y="4" width="2" height="2" fill="#f06020"/>
  <rect x="3" y="5" width="2" height="1" fill="#a01010"/>
  <rect x="11" y="5" width="2" height="1" fill="#a01010"/>
  <!-- Horizon line -->
  <rect x="0" y="12" width="16" height="1" fill="#3b2010"/>
  <!-- Ground -->
  <rect x="0" y="13" width="16" height="3" fill="#2b2b2b"/>
</svg>
