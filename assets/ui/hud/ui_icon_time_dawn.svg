<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Dawn/Sunrise icon — 16×16 pixel art, master palette colors only -->
  <!-- Sun: #ffe040 bright yellow, Glow: #f8a060 ember, Horizon: #d4a85a desert gold, Sky: #2a7ac0 -->
  <rect width="16" height="16" fill="none"/>
  <!-- Sky gradient hints (top) -->
  <rect x="0" y="0" width="16" height="1" fill="#1a4a8a"/>
  <rect x="0" y="1" width="16" height="1" fill="#2a7ac0"/>
  <!-- Warm glow band -->
  <rect x="0" y="8" width="16" height="1" fill="#f8a060"/>
  <rect x="2" y="7" width="12" height="1" fill="#f8a060"/>
  <rect x="4" y="6" width="8" height="1" fill="#d4a85a"/>
  <!-- Half-sun rising (bottom center) -->
  <rect x="6" y="9" width="4" height="1" fill="#ffe040"/>
  <rect x="5" y="10" width="6" height="1" fill="#ffe040"/>
  <rect x="5" y="11" width="6" height="1" fill="#ffe040"/>
  <!-- Sun highlight -->
  <rect x="6" y="9" width="2" height="1" fill="#fff8a0"/>
  <rect x="6" y="10" width="2" height="1" fill="#fff8a0"/>
  <!-- Rays above horizon -->
  <rect x="7" y="4" width="2" height="2" fill="#e8b800"/>
  <rect x="3" y="5" width="2" height="1" fill="#e8b800"/>
  <rect x="11" y="5" width="2" height="1" fill="#e8b800"/>
  <!-- Horizon line -->
  <rect x="0" y="12" width="16" height="1" fill="#6b3a1f"/>
  <!-- Ground -->
  <rect x="0" y="13" width="16" height="3" fill="#3b2010"/>
</svg>
