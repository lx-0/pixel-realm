<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="image-rendering: pixelated;">
  <!-- Moon icon (Night) — 16×16 pixel art, master palette colors only -->
  <!-- Body: #90d0f8 pale water, Highlight: #c8f0ff shimmer -->
  <!-- Stars: #fff8a0 pale highlight -->
  <rect width="16" height="16" fill="none"/>
  <!-- Crescent moon — draw only the visible crescent pixels -->
  <!-- Top arc -->
  <rect x="9" y="2" width="2" height="1" fill="#90d0f8"/>
  <rect x="10" y="3" width="2" height="1" fill="#90d0f8"/>
  <!-- Right side -->
  <rect x="11" y="4" width="1" height="1" fill="#90d0f8"/>
  <rect x="11" y="5" width="1" height="1" fill="#90d0f8"/>
  <rect x="11" y="6" width="1" height="1" fill="#90d0f8"/>
  <rect x="11" y="7" width="1" height="1" fill="#90d0f8"/>
  <!-- Bottom arc -->
  <rect x="10" y="8" width="2" height="1" fill="#90d0f8"/>
  <rect x="9" y="9" width="2" height="1" fill="#90d0f8"/>
  <rect x="8" y="10" width="2" height="1" fill="#90d0f8"/>
  <rect x="7" y="11" width="2" height="1" fill="#90d0f8"/>
  <!-- Inner crescent fill -->
  <rect x="9" y="4" width="2" height="1" fill="#90d0f8"/>
  <rect x="8" y="5" width="3" height="1" fill="#90d0f8"/>
  <rect x="8" y="6" width="3" height="1" fill="#90d0f8"/>
  <rect x="8" y="7" width="3" height="1" fill="#90d0f8"/>
  <rect x="8" y="8" width="2" height="1" fill="#90d0f8"/>
  <rect x="8" y="9" width="1" height="1" fill="#90d0f8"/>
  <!-- Highlight on upper crescent -->
  <rect x="10" y="3" width="1" height="1" fill="#c8f0ff"/>
  <rect x="11" y="4" width="1" height="2" fill="#c8f0ff"/>
  <!-- Stars scattered around -->
  <rect x="2" y="3" width="1" height="1" fill="#fff8a0"/>
  <rect x="4" y="7" width="1" height="1" fill="#fff8a0"/>
  <rect x="13" y="6" width="1" height="1" fill="#fff8a0"/>
  <rect x="1" y="11" width="1" height="1" fill="#fff8a0"/>
  <rect x="14" y="10" width="1" height="1" fill="#fff8a0"/>
  <rect x="5" y="1" width="1" height="1" fill="#fff8a0"/>
</svg>
