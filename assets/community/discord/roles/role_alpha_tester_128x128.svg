<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" fill="none"/>
  <!-- Badge background -->
  <rect x="16" y="16" width="96" height="96" rx="8" fill="#1a0a3a"/>
  <rect x="20" y="20" width="88" height="88" rx="6" fill="#5a20a0" opacity="0.3"/>
  <!-- Bug/beetle icon -->
  <g fill="#9050e0" filter="url(#glow)">
    <!-- Body -->
    <rect x="44" y="32" width="40" height="8"/>
    <rect x="40" y="40" width="48" height="24"/>
    <rect x="44" y="64" width="40" height="8"/>
    <rect x="48" y="72" width="32" height="4"/>
    <!-- Antennae -->
    <rect x="48" y="24" width="4" height="8"/>
    <rect x="76" y="24" width="4" height="8"/>
    <rect x="44" y="20" width="8" height="4"/>
    <rect x="76" y="20" width="8" height="4"/>
    <!-- Legs -->
    <rect x="36" y="44" width="4" height="4"/>
    <rect x="88" y="44" width="4" height="4"/>
    <rect x="36" y="56" width="4" height="4"/>
    <rect x="88" y="56" width="4" height="4"/>
  </g>
  <!-- Wing split line -->
  <rect x="62" y="40" width="4" height="32" fill="#d090ff" opacity="0.4"/>
  <!-- Eye -->
  <rect x="52" y="36" width="4" height="4" fill="#ffe040"/>
  <rect x="72" y="36" width="4" height="4" fill="#ffe040"/>
  <!-- Label -->
  <text x="64" y="100" fill="#d090ff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">ALPHA</text>
</svg>