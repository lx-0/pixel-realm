<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" style="image-rendering: pixelated;">
  <rect width="128" height="128" fill="none"/>
  <!-- Badge background -->
  <rect x="16" y="16" width="96" height="96" rx="8" fill="#1a3a1a"/>
  <rect x="20" y="20" width="88" height="88" rx="6" fill="#2d6e2d" opacity="0.3"/>
  <!-- Shield icon -->
  <g fill="#4c9b4c">
    <rect x="40" y="28" width="48" height="8"/>
    <rect x="36" y="36" width="56" height="28"/>
    <rect x="40" y="64" width="48" height="8"/>
    <rect x="48" y="72" width="32" height="8"/>
    <rect x="56" y="80" width="16" height="4"/>
  </g>
  <!-- Check mark on shield -->
  <g fill="#a8e4a0">
    <rect x="48" y="52" width="8" height="8"/>
    <rect x="56" y="44" width="8" height="8"/>
    <rect x="64" y="36" width="8" height="8"/>
    <rect x="72" y="36" width="8" height="8"/>
  </g>
  <!-- Label -->
  <text x="64" y="100" fill="#78c878" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">MOD</text>
</svg>