<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" fill="none"/>
  <!-- Badge background -->
  <rect x="16" y="16" width="96" height="96" rx="8" fill="#0a1a3a"/>
  <rect x="20" y="20" width="88" height="88" rx="6" fill="#1a4a8a" opacity="0.3"/>
  <!-- Code brackets < / > -->
  <g fill="#50a8e8" filter="url(#glow)">
    <!-- < -->
    <rect x="28" y="48" width="8" height="8" fill="#50a8e8"/>
    <rect x="36" y="40" width="8" height="8" fill="#50a8e8"/>
    <rect x="36" y="56" width="8" height="8" fill="#50a8e8"/>
    <rect x="44" y="32" width="8" height="8" fill="#50a8e8"/>
    <rect x="44" y="64" width="8" height="8" fill="#50a8e8"/>
    <!-- / -->
    <rect x="56" y="56" width="8" height="8" fill="#90d0f8"/>
    <rect x="60" y="48" width="8" height="8" fill="#90d0f8"/>
    <rect x="64" y="40" width="8" height="8" fill="#90d0f8"/>
    <!-- > -->
    <rect x="76" y="32" width="8" height="8" fill="#50a8e8"/>
    <rect x="76" y="64" width="8" height="8" fill="#50a8e8"/>
    <rect x="84" y="40" width="8" height="8" fill="#50a8e8"/>
    <rect x="84" y="56" width="8" height="8" fill="#50a8e8"/>
    <rect x="92" y="48" width="8" height="8" fill="#50a8e8"/>
  </g>
  <!-- Label -->
  <text x="64" y="100" fill="#90d0f8" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">DEV</text>
</svg>