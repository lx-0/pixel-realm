<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" fill="none"/>
  <!-- Badge background -->
  <rect x="16" y="16" width="96" height="96" rx="8" fill="#3b2010"/>
  <rect x="20" y="20" width="88" height="88" rx="6" fill="#a87000" opacity="0.3"/>
  <!-- Crown -->
  <g fill="#e8b800" filter="url(#glow)">
    <!-- Points -->
    <rect x="36" y="28" width="8" height="8" fill="#ffe040"/>
    <rect x="60" y="24" width="8" height="12" fill="#ffe040"/>
    <rect x="84" y="28" width="8" height="8" fill="#ffe040"/>
    <!-- Body -->
    <rect x="32" y="36" width="64" height="8" fill="#ffe040"/>
    <rect x="32" y="44" width="64" height="20" fill="#e8b800"/>
    <!-- Band -->
    <rect x="32" y="64" width="64" height="8" fill="#a87000"/>
    <rect x="32" y="64" width="64" height="4" fill="#e8b800"/>
    <!-- Jewels -->
    <rect x="44" y="48" width="8" height="8" fill="#d42020"/>
    <rect x="60" y="48" width="8" height="8" fill="#50a8e8"/>
    <rect x="76" y="48" width="8" height="8" fill="#4c9b4c"/>
  </g>
  <!-- Label -->
  <text x="64" y="100" fill="#ffe040" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">GUILD</text>
</svg>