<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" fill="none"/>
  <!-- Badge background -->
  <rect x="16" y="16" width="96" height="96" rx="8" fill="#0d0d1a"/>
  <rect x="20" y="20" width="88" height="88" rx="6" fill="#2a7ac0" opacity="0.2"/>
  <!-- Heart + wrench -->
  <g filter="url(#glow)">
    <!-- Heart -->
    <rect x="40" y="28" width="12" height="4" fill="#d42020"/>
    <rect x="60" y="28" width="12" height="4" fill="#d42020"/>
    <rect x="36" y="32" width="20" height="8" fill="#d42020"/>
    <rect x="56" y="32" width="20" height="8" fill="#d42020"/>
    <rect x="36" y="40" width="40" height="8" fill="#a01010"/>
    <rect x="40" y="48" width="32" height="8" fill="#a01010"/>
    <rect x="44" y="56" width="24" height="4" fill="#5a0a0a"/>
    <rect x="48" y="60" width="16" height="4" fill="#5a0a0a"/>
    <rect x="52" y="64" width="8" height="4" fill="#5a0a0a"/>
    <!-- Sparkle -->
    <rect x="44" y="32" width="4" height="4" fill="#f06020" opacity="0.5"/>
    <!-- Wrench overlay -->
    <rect x="68" y="56" width="12" height="4" fill="#c8c8c8"/>
    <rect x="76" y="52" width="4" height="12" fill="#969696"/>
    <rect x="80" y="48" width="8" height="4" fill="#c8c8c8"/>
    <rect x="80" y="60" width="8" height="4" fill="#c8c8c8"/>
  </g>
  <!-- Label -->
  <text x="64" y="100" fill="#90d0f8" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">CONTRIB</text>
</svg>