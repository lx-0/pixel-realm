    <rect x="24" y="8" width="8" height="16" fill="#f0f0f0" opacity="0.3"/>
    <!-- Body -->
    <rect x="12" y="24" width="40" height="8" fill="#c8c8c8"/>
    <rect x="8" y="32" width="48" height="56" fill="#c8c8c8"/>
    <rect x="12" y="88" width="40" height="8" fill="#969696"/>
    <!-- Liquid -->
    <rect x="12" y="44" width="40" height="44" fill="#d42020"/>
    <rect x="12" y="44" width="40" height="8" fill="#a01010"/>
