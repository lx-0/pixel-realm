    <rect x="40" y="12" width="4" height="4" fill="#90d0f8" opacity="0.4"/>
    <rect x="52" y="16" width="4" height="4" fill="#90d0f8" opacity="0.4"/>
    <rect x="64" y="12" width="4" height="4" fill="#90d0f8" opacity="0.4"/>
