<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" style="image-rendering: pixelated;">
  <rect width="128" height="128" fill="none"/>
  <g transform="translate(8, 28)">
    <!-- Tail -->
    <rect x="0" y="16" width="8" height="8" fill="#1a4a8a"/>
    <rect x="0" y="8" width="8" height="8" fill="#2a7ac0"/>
    <rect x="0" y="24" width="8" height="8" fill="#2a7ac0"/>
    <rect x="0" y="0" width="8" height="8" fill="#50a8e8"/>
    <rect x="0" y="32" width="8" height="8" fill="#50a8e8"/>
    <!-- Body -->
    <rect x="8" y="8" width="8" height="24" fill="#2a7ac0"/>
    <rect x="16" y="4" width="8" height="32" fill="#50a8e8"/>
    <rect x="24" y="0" width="32" height="40" fill="#50a8e8"/>
    <rect x="56" y="4" width="24" height="32" fill="#50a8e8"/>
    <rect x="80" y="8" width="16" height="24" fill="#2a7ac0"/>
    <rect x="96" y="12" width="8" height="16" fill="#1a4a8a"/>
