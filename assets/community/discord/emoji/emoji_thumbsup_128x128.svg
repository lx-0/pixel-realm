<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" style="image-rendering: pixelated;">
  <rect width="128" height="128" fill="none"/>
  <g transform="translate(24, 8)">
    <!-- Thumb -->
    <rect x="28" y="0" width="12" height="8" fill="#d4a85a"/>
    <rect x="24" y="8" width="16" height="32" fill="#e8d08a"/>
    <rect x="24" y="8" width="4" height="32" fill="#d4a85a"/>
    <!-- Hand body -->
    <rect x="16" y="40" width="48" height="8" fill="#e8d08a"/>
    <rect x="12" y="48" width="56" height="32" fill="#e8d08a"/>
    <rect x="12" y="48" width="4" height="32" fill="#d4a85a"/>
    <rect x="16" y="80" width="48" height="8" fill="#d4a85a"/>
    <!-- Finger lines -->
    <rect x="12" y="56" width="56" height="2" fill="#b8843f" opacity="0.3"/>
    <rect x="12" y="64" width="56" height="2" fill="#b8843f" opacity="0.3"/>
    <rect x="12" y="72" width="56" height="2" fill="#b8843f" opacity="0.3"/>
    <!-- Cuff -->
    <rect x="8" y="88" width="64" height="12" fill="#50a8e8"/>
    <rect x="8" y="88" width="64" height="4" fill="#2a7ac0"/>
    <!-- Sparkle -->
    <rect x="52" y="20" width="4" height="4" fill="#ffe040"/>
    <rect x="60" y="12" width="4" height="4" fill="#ffe040"/>
  </g>
</svg>