<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" style="image-rendering: pixelated;">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>

  <!-- Pixel landscape silhouette - forest biome -->
  <g fill="#14142a">
    <polygon points="0,540 0,350 30,340 60,300 90,320 120,280 150,310 180,260 210,290 240,250 270,280 300,240 330,270 360,250 390,290 420,260 450,300 480,270 510,310 540,280 570,320 600,290 630,330 660,300 690,340 720,310 750,350 780,320 810,360 840,330 870,370 900,340 930,380 960,350 960,540"/>
  </g>
  <g fill="#1a1a35">
    <polygon points="0,540 0,400 50,380 100,400 150,370 200,390 250,360 300,390 350,370 400,400 450,380 500,400 550,370 600,390 650,360 700,390 750,370 800,400 850,380 900,400 960,380 960,540"/>
  </g>

  <!-- Pixel tree silhouettes -->
  <g fill="#14142a" opacity="0.7">
    <!-- Tree 1 -->
    <rect x="100" y="310" width="16" height="40"/>
    <polygon points="80,310 128,310 104,260"/>
    <polygon points="85,280 123,280 104,240"/>
    <!-- Tree 2 -->
    <rect x="750" y="300" width="16" height="50"/>
    <polygon points="730,300 778,300 754,250"/>
    <polygon points="735,270 773,270 754,230"/>
    <!-- Tree 3 -->
    <rect x="850" y="320" width="12" height="35"/>
    <polygon points="834,320 874,320 854,280"/>
  </g>

  <!-- Stars -->
  <g fill="#fff8a0" filter="url(#glow)" opacity="0.5">
    <rect x="80" y="40" width="4" height="4"/>
    <rect x="200" y="70" width="6" height="6"/>
    <rect x="340" y="30" width="4" height="4"/>
    <rect x="500" y="55" width="6" height="6"/>
    <rect x="650" y="35" width="4" height="4"/>
    <rect x="800" y="60" width="6" height="6"/>
    <rect x="900" y="40" width="4" height="4"/>
    <rect x="150" y="110" width="3" height="3"/>
    <rect x="450" y="95" width="3" height="3"/>
    <rect x="720" y="100" width="3" height="3"/>
  </g>

  <!-- Logo: PIXEL in cyan -->
  <g fill="#50a8e8" transform="translate(200, 120) scale(1.5)">
    <rect x="0" y="0" width="8" height="56"/>
    <rect x="8" y="0" width="16" height="8"/>
    <rect x="24" y="8" width="8" height="16"/>
    <rect x="8" y="24" width="16" height="8"/>
    <rect x="48" y="0" width="24" height="8"/>
    <rect x="56" y="8" width="8" height="40"/>
    <rect x="48" y="48" width="24" height="8"/>
    <rect x="88" y="0" width="8" height="8"/>
    <rect x="112" y="0" width="8" height="8"/>
    <rect x="96" y="8" width="16" height="8"/>
    <rect x="100" y="24" width="8" height="8"/>
    <rect x="96" y="32" width="16" height="8"/>
    <rect x="88" y="40" width="8" height="16"/>
    <rect x="112" y="40" width="8" height="16"/>
    <rect x="136" y="0" width="8" height="56"/>
    <rect x="144" y="0" width="24" height="8"/>
    <rect x="144" y="24" width="16" height="8"/>
    <rect x="144" y="48" width="24" height="8"/>
    <rect x="184" y="0" width="8" height="56"/>
    <rect x="192" y="48" width="24" height="8"/>
  </g>

  <!-- REALM in gold -->
  <g fill="#ffe040" transform="translate(200, 120) scale(1.5)">
    <rect x="240" y="0" width="8" height="56"/>
    <rect x="248" y="0" width="16" height="8"/>
    <rect x="264" y="8" width="8" height="16"/>
    <rect x="248" y="24" width="16" height="8"/>
    <rect x="256" y="32" width="8" height="8"/>
    <rect x="264" y="40" width="8" height="16"/>
    <rect x="288" y="0" width="8" height="56"/>
    <rect x="296" y="0" width="24" height="8"/>
    <rect x="296" y="24" width="16" height="8"/>
    <rect x="296" y="48" width="24" height="8"/>
    <rect x="344" y="8" width="8" height="48"/>
    <rect x="368" y="8" width="8" height="48"/>
    <rect x="352" y="0" width="16" height="8"/>
    <rect x="352" y="24" width="16" height="8"/>
    <rect x="392" y="0" width="8" height="56"/>
    <rect x="400" y="48" width="24" height="8"/>
    <rect x="440" y="0" width="8" height="56"/>
    <rect x="480" y="0" width="8" height="56"/>
    <rect x="448" y="8" width="8" height="8"/>
    <rect x="472" y="8" width="8" height="8"/>
    <rect x="456" y="16" width="16" height="8"/>
  </g>

  <!-- Subtitle -->
  <text x="480" y="240" fill="#b0b0c0" font-family="monospace" font-size="14" text-anchor="middle" letter-spacing="5">PIXELATED  MMORPG  ADVENTURE</text>

  <!-- Community tagline -->
  <text x="480" y="280" fill="#50a8e8" font-family="monospace" font-size="16" text-anchor="middle" letter-spacing="3" filter="url(#glow)">JOIN THE COMMUNITY</text>

  <!-- Decorative separator -->
  <g fill="#4a4a4a" opacity="0.4">
    <rect x="200" y="300" width="560" height="2"/>
  </g>
  <rect x="476" y="298" width="8" height="6" fill="#e8b800"/>

  <!-- Community feature icons -->
  <g transform="translate(200, 340)">
    <!-- Guild icon -->
    <rect x="0" y="0" width="50" height="50" rx="4" fill="#2a7ac0" opacity="0.2"/>
    <g fill="#50a8e8">
      <rect x="17" y="8" width="16" height="4"/>
      <rect x="13" y="12" width="24" height="20"/>
      <rect x="21" y="16" width="8" height="8" fill="#ffe040"/>
    </g>
    <text x="25" y="62" fill="#50a8e8" font-family="monospace" font-size="8" text-anchor="middle">GUILDS</text>

    <!-- PvP icon -->
    <rect x="140" y="0" width="50" height="50" rx="4" fill="#5a0a0a" opacity="0.2"/>
    <g fill="#d42020">
      <rect x="155" y="8" width="4" height="24"/>
      <rect x="171" y="8" width="4" height="24"/>
      <rect x="159" y="14" width="12" height="4" fill="#f06020"/>
    </g>
    <text x="165" y="62" fill="#d42020" font-family="monospace" font-size="8" text-anchor="middle">PVP</text>

    <!-- Trade icon -->
    <rect x="280" y="0" width="50" height="50" rx="4" fill="#a87000" opacity="0.2"/>
    <g fill="#e8b800">
      <rect x="297" y="10" width="16" height="12"/>
      <rect x="301" y="22" width="8" height="6"/>
      <rect x="303" y="14" width="4" height="4" fill="#ffe040"/>
    </g>
    <text x="305" y="62" fill="#e8b800" font-family="monospace" font-size="8" text-anchor="middle">TRADE</text>

    <!-- Events icon -->
    <rect x="420" y="0" width="50" height="50" rx="4" fill="#1a0a3a" opacity="0.2"/>
    <g fill="#9050e0">
      <rect x="437" y="8" width="16" height="4"/>
      <rect x="441" y="12" width="8" height="16"/>
      <rect x="437" y="28" width="16" height="4"/>
      <rect x="443" y="32" width="4" height="4" fill="#d090ff"/>
    </g>
    <text x="445" y="62" fill="#9050e0" font-family="monospace" font-size="8" text-anchor="middle">EVENTS</text>

    <!-- Chat icon -->
    <rect x="560" y="0" width="50" height="50" rx="4" fill="#1a3a1a" opacity="0.2"/>
    <g fill="#4c9b4c">
      <rect x="573" y="10" width="24" height="18"/>
      <rect x="577" y="28" width="4" height="4"/>
      <rect x="577" y="14" width="16" height="2" fill="#78c878"/>
      <rect x="577" y="18" width="12" height="2" fill="#78c878"/>
      <rect x="577" y="22" width="14" height="2" fill="#78c878"/>
    </g>
    <text x="585" y="62" fill="#4c9b4c" font-family="monospace" font-size="8" text-anchor="middle">CHAT</text>
  </g>

  <!-- Bottom bar -->
  <rect x="60" y="490" width="840" height="1" fill="#404060" opacity="0.3"/>
  <text x="480" y="520" fill="#505060" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="3">PLAY FREE  ·  pixelforgestudios.com</text>
</svg>