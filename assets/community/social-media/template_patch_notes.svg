  <rect x="80" y="550" width="12" height="12" fill="#d42020"/>
  <text x="108" y="562" fill="#f06020" font-family="monospace" font-size="22" font-weight="bold">BUG FIXES</text>
  <rect x="108" y="580" width="8" height="8" fill="#969696"/>
  <text x="130" y="588" fill="#c8c8c8" font-family="monospace" font-size="16">Fixed issue description</text>
  <rect x="108" y="610" width="8" height="8" fill="#969696"/>
  <text x="130" y="618" fill="#c8c8c8" font-family="monospace" font-size="16">Another bug squashed</text>

