<svg xmlns="http://www.w3.org/2000/svg" width="600" height="80" viewBox="0 0 600 80" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d0d1a" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#1a1a2e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Banner background -->
  <rect width="600" height="80" fill="url(#bannerBg)"/>

  <!-- Top/bottom border -->
  <rect x="0" y="0" width="600" height="3" fill="#50a8e8"/>
  <rect x="0" y="77" width="600" height="3" fill="#50a8e8"/>

  <!-- Left decoration - pixel sword -->
  <g transform="translate(16, 16)">
    <rect x="10" y="0" width="3" height="3" fill="#90d0f8"/>
    <rect x="10" y="3" width="3" height="32" fill="#c8c8c8"/>
    <rect x="4" y="35" width="15" height="3" fill="#6b3a1f"/>
    <rect x="10" y="38" width="3" height="6" fill="#3b2010"/>
    <rect x="8" y="44" width="7" height="3" fill="#e8b800"/>
  </g>

  <!-- "NOW PLAYING" text -->
  <text x="70" y="34" fill="#969696" font-family="monospace" font-size="10" letter-spacing="3">NOW PLAYING</text>

  <!-- PIXELREALM logo text -->
  <g filter="url(#glow)">
    <text x="70" y="58" fill="#50a8e8" font-family="monospace" font-size="18" letter-spacing="2" font-weight="bold">PIXEL</text>
    <text x="172" y="58" fill="#ffe040" font-family="monospace" font-size="18" letter-spacing="2" font-weight="bold">REALM</text>
  </g>

  <!-- Right side - class icons -->
  <g transform="translate(420, 18)">
    <!-- Warrior -->
    <rect x="0" y="0" width="32" height="32" rx="3" fill="#c0392b" opacity="0.2"/>
    <rect x="13" y="4" width="3" height="18" fill="#c8c8c8"/>
    <rect x="8" y="20" width="13" height="2" fill="#6b3a1f"/>
    <text x="16" y="42" fill="#c0392b" font-family="monospace" font-size="6" text-anchor="middle">WAR</text>

    <!-- Mage -->
    <rect x="44" y="0" width="32" height="32" rx="3" fill="#8e44ad" opacity="0.2"/>
    <rect x="57" y="4" width="3" height="22" fill="#8b4513"/>
    <rect x="53" y="2" width="10" height="6" fill="#d090ff"/>
    <text x="60" y="42" fill="#9b59b6" font-family="monospace" font-size="6" text-anchor="middle">MAG</text>

    <!-- Ranger -->
    <rect x="88" y="0" width="32" height="32" rx="3" fill="#27ae60" opacity="0.2"/>
    <rect x="98" y="4" width="3" height="24" fill="#8b5c2a"/>
    <rect x="102" y="3" width="1" height="26" fill="#c8c8c8" opacity="0.6"/>
    <text x="104" y="42" fill="#2ecc71" font-family="monospace" font-size="6" text-anchor="middle">RNG</text>

    <!-- Artisan -->
    <rect x="132" y="0" width="32" height="32" rx="3" fill="#d4a017" opacity="0.2"/>
    <rect x="146" y="10" width="3" height="16" fill="#8b4513"/>
    <rect x="141" y="4" width="13" height="8" fill="#6e6e6e"/>
    <text x="148" y="42" fill="#f0c040" font-family="monospace" font-size="6" text-anchor="middle">ART</text>
  </g>

  <!-- Sparkle accents -->
  <g fill="#ffe040" filter="url(#glow)" opacity="0.5">
    <rect x="300" y="20" width="3" height="3"/>
    <rect x="350" y="50" width="3" height="3"/>
    <rect x="400" y="30" width="3" height="3"/>
  </g>
</svg>