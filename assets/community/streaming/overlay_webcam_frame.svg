<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Transparent center for webcam feed -->
  <rect x="16" y="16" width="368" height="368" fill="none"/>

  <!-- Outer frame border - pixel art style -->
  <rect x="0" y="0" width="400" height="8" fill="#2b2b2b"/>
  <rect x="0" y="392" width="400" height="8" fill="#2b2b2b"/>
  <rect x="0" y="0" width="8" height="400" fill="#2b2b2b"/>
  <rect x="392" y="0" width="8" height="400" fill="#2b2b2b"/>

  <!-- Inner accent border -->
  <rect x="8" y="8" width="384" height="4" fill="#50a8e8"/>
  <rect x="8" y="388" width="384" height="4" fill="#50a8e8"/>
  <rect x="8" y="8" width="4" height="384" fill="#50a8e8"/>
  <rect x="388" y="8" width="4" height="384" fill="#50a8e8"/>

  <!-- Corner decorations (pixel art corners) -->
  <!-- Top-left -->
  <rect x="0" y="0" width="24" height="24" fill="#1a4a8a"/>
  <rect x="4" y="4" width="16" height="16" fill="#50a8e8"/>
  <rect x="8" y="8" width="8" height="8" fill="#90d0f8"/>

  <!-- Top-right -->
  <rect x="376" y="0" width="24" height="24" fill="#1a4a8a"/>
  <rect x="380" y="4" width="16" height="16" fill="#50a8e8"/>
  <rect x="384" y="8" width="8" height="8" fill="#90d0f8"/>

  <!-- Bottom-left -->
  <rect x="0" y="376" width="24" height="24" fill="#1a4a8a"/>
  <rect x="4" y="380" width="16" height="16" fill="#50a8e8"/>
  <rect x="8" y="384" width="8" height="8" fill="#90d0f8"/>

  <!-- Bottom-right -->
  <rect x="376" y="376" width="24" height="24" fill="#1a4a8a"/>
  <rect x="380" y="380" width="16" height="16" fill="#50a8e8"/>
  <rect x="384" y="384" width="8" height="8" fill="#90d0f8"/>

  <!-- Top center - mini logo text -->
  <rect x="140" y="0" width="120" height="16" fill="#0d0d1a"/>
  <rect x="140" y="0" width="120" height="4" fill="#2b2b2b"/>
  <text x="200" y="13" fill="#50a8e8" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="2" filter="url(#glow)">PIXELREALM</text>

  <!-- Sparkle accents on frame -->
  <g fill="#ffe040" filter="url(#glow)" opacity="0.6">
    <rect x="60" y="2" width="4" height="4"/>
    <rect x="336" y="2" width="4" height="4"/>
    <rect x="2" y="180" width="4" height="4"/>
    <rect x="394" y="220" width="4" height="4"/>
  </g>
</svg>