<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Semi-transparent panel background -->
  <rect x="0" y="0" width="400" height="600" fill="url(#panelBg)"/>

  <!-- Outer frame -->
  <rect x="0" y="0" width="400" height="6" fill="#2b2b2b"/>
  <rect x="0" y="594" width="400" height="6" fill="#2b2b2b"/>
  <rect x="0" y="0" width="6" height="600" fill="#2b2b2b"/>
  <rect x="394" y="0" width="6" height="600" fill="#2b2b2b"/>

  <!-- Inner accent -->
  <rect x="6" y="6" width="388" height="3" fill="#50a8e8"/>
  <rect x="6" y="591" width="388" height="3" fill="#50a8e8"/>
  <rect x="6" y="6" width="3" height="588" fill="#50a8e8"/>
  <rect x="391" y="6" width="3" height="588" fill="#50a8e8"/>

  <!-- Header bar -->
  <rect x="6" y="6" width="388" height="36" fill="#1a4a8a" opacity="0.6"/>
  <rect x="6" y="39" width="388" height="3" fill="#50a8e8"/>

  <!-- Chat icon in header -->
  <rect x="16" y="14" width="20" height="14" fill="#50a8e8"/>
  <rect x="20" y="28" width="4" height="4" fill="#50a8e8"/>
  <!-- Chat text lines -->
  <rect x="22" y="18" width="10" height="2" fill="#90d0f8"/>
  <rect x="22" y="22" width="8" height="2" fill="#90d0f8"/>

  <!-- Header title -->
  <text x="48" y="28" fill="#c8f0ff" font-family="monospace" font-size="12" letter-spacing="2">CHAT</text>

  <!-- Scroll indicator decoration on right -->
  <rect x="380" y="60" width="6" height="40" fill="#4a4a4a" opacity="0.3"/>
  <rect x="380" y="60" width="6" height="12" fill="#50a8e8" opacity="0.5"/>

  <!-- Corner decorations -->
  <rect x="0" y="0" width="16" height="16" fill="#1a4a8a"/>
  <rect x="4" y="4" width="8" height="8" fill="#50a8e8"/>
  <rect x="384" y="0" width="16" height="16" fill="#1a4a8a"/>
  <rect x="388" y="4" width="8" height="8" fill="#50a8e8"/>
  <rect x="0" y="584" width="16" height="16" fill="#1a4a8a"/>
  <rect x="4" y="588" width="8" height="8" fill="#50a8e8"/>
  <rect x="384" y="584" width="16" height="16" fill="#1a4a8a"/>
  <rect x="388" y="588" width="8" height="8" fill="#50a8e8"/>

  <!-- Bottom branding -->
  <rect x="6" y="570" width="388" height="3" fill="#50a8e8" opacity="0.4"/>
  <text x="200" y="586" fill="#505060" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">pixelforgestudios.com</text>
</svg>