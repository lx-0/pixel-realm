    <text x="80" y="26" fill="#7289da" font-family="monospace" font-size="12" text-anchor="middle">DC</text>

    <!-- YouTube -->
    <rect x="120" y="0" width="40" height="40" rx="4" fill="#2b2b2b"/>
    <text x="140" y="26" fill="#d42020" font-family="monospace" font-size="14" text-anchor="middle">YT</text>

    <!-- Web -->
    <rect x="180" y="0" width="40" height="40" rx="4" fill="#2b2b2b"/>
    <text x="200" y="26" fill="#4c9b4c" font-family="monospace" font-size="12" text-anchor="middle">WEB</text>

    <!-- itch.io -->
    <rect x="240" y="0" width="40" height="40" rx="4" fill="#2b2b2b"/>
    <text x="260" y="26" fill="#f8a060" font-family="monospace" font-size="10" text-anchor="middle">ITCH</text>

    <!-- Labels -->
    <text x="20" y="56" fill="#505060" font-family="monospace" font-size="7" text-anchor="middle">TWITTER</text>
    <text x="80" y="56" fill="#505060" font-family="monospace" font-size="7" text-anchor="middle">DISCORD</text>
    <text x="140" y="56" fill="#505060" font-family="monospace" font-size="7" text-anchor="middle">YOUTUBE</text>
    <text x="200" y="56" fill="#505060" font-family="monospace" font-size="7" text-anchor="middle">WEBSITE</text>
    <text x="260" y="56" fill="#505060" font-family="monospace" font-size="7" text-anchor="middle">ITCH.IO</text>
  </g>

  <!-- Bottom border decoration -->
  <rect x="0" y="1072" width="1920" height="8" fill="#2b2b2b"/>
  <rect x="0" y="1072" width="1920" height="3" fill="#50a8e8" opacity="0.4"/>

  <!-- Top border decoration -->
  <rect x="0" y="0" width="1920" height="8" fill="#2b2b2b"/>
  <rect x="0" y="5" width="1920" height="3" fill="#50a8e8" opacity="0.4"/>

  <!-- Pixel art frame corners -->
  <g fill="#1a4a8a">
    <rect x="0" y="0" width="32" height="32"/>
    <rect x="1888" y="0" width="32" height="32"/>
    <rect x="0" y="1048" width="32" height="32"/>
    <rect x="1888" y="1048" width="32" height="32"/>
  </g>
  <g fill="#50a8e8">
    <rect x="8" y="8" width="16" height="16"/>
    <rect x="1896" y="8" width="16" height="16"/>
    <rect x="8" y="1056" width="16" height="16"/>
    <rect x="1896" y="1056" width="16" height="16"/>
  </g>
