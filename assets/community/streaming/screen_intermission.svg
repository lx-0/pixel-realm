<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" style="image-rendering: pixelated;">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Pixel landscape -->
  <g fill="#14142a">
    <polygon points="0,1080 0,720 60,700 120,680 180,720 240,660 300,700 360,640 420,680 480,620 540,660 600,600 660,640 720,620 780,680 840,640 900,600 960,660 1020,620 1080,580 1140,620 1200,660 1260,620 1320,680 1380,640 1440,700 1500,660 1560,700 1620,680 1680,720 1740,700 1800,740 1860,720 1920,760 1920,1080"/>
  </g>
  <g fill="#1a1a35">
    <polygon points="0,1080 0,800 80,780 160,800 240,760 320,800 400,780 480,740 560,780 640,800 720,760 800,800 880,780 960,740 1040,780 1120,800 1200,760 1280,800 1360,780 1440,800 1520,760 1600,800 1680,780 1760,800 1840,780 1920,820 1920,1080"/>
  </g>

  <!-- Trees silhouettes -->
  <g fill="#14142a" opacity="0.6">
    <polygon points="180,720 220,720 200,660"/>
    <polygon points="185,690 215,690 200,640"/>
    <rect x="196" y="720" width="8" height="30"/>

    <polygon points="1680,700 1720,700 1700,640"/>
    <polygon points="1685,670 1715,670 1700,620"/>
    <rect x="1696" y="700" width="8" height="30"/>

    <polygon points="300,740 340,740 320,680"/>
    <rect x="316" y="740" width="8" height="20"/>

    <polygon points="1560,720 1600,720 1580,660"/>
    <rect x="1576" y="720" width="8" height="20"/>
  </g>

  <!-- Stars field -->
  <g fill="#fff8a0" filter="url(#glow)" opacity="0.5">
    <rect x="200" y="100" width="6" height="6"/>
    <rect x="500" y="150" width="8" height="8"/>
    <rect x="800" y="80" width="6" height="6"/>
    <rect x="1100" y="120" width="8" height="8"/>
    <rect x="1400" y="90" width="6" height="6"/>
    <rect x="1700" y="140" width="8" height="8"/>
    <rect x="350" y="200" width="4" height="4"/>
    <rect x="650" y="250" width="4" height="4"/>
    <rect x="950" y="180" width="4" height="4"/>
    <rect x="1250" y="220" width="4" height="4"/>
    <rect x="1550" y="200" width="4" height="4"/>
    <rect x="100" y="300" width="4" height="4"/>
    <rect x="1800" y="280" width="4" height="4"/>
  </g>

  <!-- Logo: PIXEL in cyan, centered -->
  <g fill="#50a8e8" transform="translate(530, 300) scale(2.5)">
    <rect x="0" y="0" width="8" height="56"/>
    <rect x="8" y="0" width="16" height="8"/>
    <rect x="24" y="8" width="8" height="16"/>
    <rect x="8" y="24" width="16" height="8"/>
    <rect x="48" y="0" width="24" height="8"/>
    <rect x="56" y="8" width="8" height="40"/>
    <rect x="48" y="48" width="24" height="8"/>
    <rect x="88" y="0" width="8" height="8"/>
    <rect x="112" y="0" width="8" height="8"/>
    <rect x="96" y="8" width="16" height="8"/>
    <rect x="100" y="24" width="8" height="8"/>
    <rect x="96" y="32" width="16" height="8"/>
    <rect x="88" y="40" width="8" height="16"/>
    <rect x="112" y="40" width="8" height="16"/>
    <rect x="136" y="0" width="8" height="56"/>
    <rect x="144" y="0" width="24" height="8"/>
    <rect x="144" y="24" width="16" height="8"/>
    <rect x="144" y="48" width="24" height="8"/>
    <rect x="184" y="0" width="8" height="56"/>
    <rect x="192" y="48" width="24" height="8"/>
  </g>

  <!-- REALM in gold -->
  <g fill="#ffe040" transform="translate(530, 300) scale(2.5)">
    <rect x="240" y="0" width="8" height="56"/>
    <rect x="248" y="0" width="16" height="8"/>
    <rect x="264" y="8" width="8" height="16"/>
    <rect x="248" y="24" width="16" height="8"/>
    <rect x="256" y="32" width="8" height="8"/>
    <rect x="264" y="40" width="8" height="16"/>
    <rect x="288" y="0" width="8" height="56"/>
    <rect x="296" y="0" width="24" height="8"/>
    <rect x="296" y="24" width="16" height="8"/>
    <rect x="296" y="48" width="24" height="8"/>
    <rect x="344" y="8" width="8" height="48"/>
    <rect x="368" y="8" width="8" height="48"/>
    <rect x="352" y="0" width="16" height="8"/>
    <rect x="352" y="24" width="16" height="8"/>
    <rect x="392" y="0" width="8" height="56"/>
    <rect x="400" y="48" width="24" height="8"/>
    <rect x="440" y="0" width="8" height="56"/>
    <rect x="480" y="0" width="8" height="56"/>
    <rect x="448" y="8" width="8" height="8"/>
    <rect x="472" y="8" width="8" height="8"/>
    <rect x="456" y="16" width="16" height="8"/>
  </g>

  <!-- Subtitle -->
  <text x="960" y="490" fill="#b0b0c0" font-family="monospace" font-size="20" text-anchor="middle" letter-spacing="6">PIXELATED  MMORPG  ADVENTURE</text>

  <!-- BRB / Intermission text -->
  <g filter="url(#glow)">
    <text x="960" y="570" fill="#ffe040" font-family="monospace" font-size="36" text-anchor="middle" letter-spacing="8" font-weight="bold">BE RIGHT BACK</text>
  </g>

  <!-- Decorative separator -->
  <rect x="600" y="590" width="720" height="2" fill="#4a4a4a" opacity="0.4"/>
  <rect x="956" y="588" width="8" height="6" fill="#e8b800"/>

  <!-- Social links area -->
  <text x="960" y="640" fill="#707080" font-family="monospace" font-size="14" text-anchor="middle" letter-spacing="4">FOLLOW THE ADVENTURE</text>

  <!-- Social icon placeholders -->
  <g transform="translate(760, 660)">
    <!-- Twitter/X -->
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#2b2b2b"/>
    <text x="20" y="26" fill="#50a8e8" font-family="monospace" font-size="14" text-anchor="middle">X</text>

    <!-- Discord -->
