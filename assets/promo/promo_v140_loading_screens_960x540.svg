<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" style="image-rendering: pixelated;">
  <!-- === BACKGROUND === -->
  <rect width="960" height="540" fill="#0a0a14"/>

  <!-- === HEADER === -->
  <text x="480" y="36" fill="#e8b800" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">ZONE LOADING SCREENS</text>
  <text x="480" y="52" fill="#969696" font-family="monospace" font-size="9" text-anchor="middle">Each zone features unique art, tips, and lore while loading</text>

  <!-- === 2x2 GRID OF LOADING SCREENS === -->

  <!-- ===== PANEL 1: VERDANT HOLLOW (Forest) - Top Left ===== -->
  <g transform="translate(30, 70)">
    <rect width="430" height="210" rx="4" fill="#0d0d0d" stroke="#4c9b4c" stroke-width="2"/>
    <rect x="2" y="2" width="426" height="206" rx="3" fill="#1a3a1a"/>

    <!-- Forest scene -->
    <rect x="2" y="2" width="426" height="140" fill="#2a5a8a"/><!-- sky -->
    <rect x="2" y="100" width="426" height="42" fill="#1a4a6a"/>
    <!-- Mountains -->
    <g fill="#0d2e0d" opacity="0.5">
      <polygon points="20,142 70,80 120,142"/>
      <polygon points="100,142 160,70 220,142"/>
      <polygon points="200,142 270,85 340,142"/>
      <polygon points="310,142 370,75 428,142"/>
    </g>
    <!-- Trees -->
    <g fill="#2d6e2d">
      <polygon points="30,142 50,90 70,142"/>
      <polygon points="60,142 80,95 100,142"/>
      <polygon points="320,142 340,88 360,142"/>
      <polygon points="350,142 370,92 390,142"/>
      <polygon points="390,142 410,85 428,142"/>
    </g>
    <!-- Ground -->
    <rect x="2" y="140" width="426" height="68" fill="#2d6e2d"/>
    <rect x="2" y="140" width="426" height="3" fill="#4c9b4c"/>
    <!-- Flowers -->
    <g>
      <rect x="50" y="160" width="3" height="4" fill="#4c9b4c"/>
      <rect x="50" y="157" width="3" height="3" fill="#d42020"/>
      <rect x="150" y="165" width="3" height="4" fill="#4c9b4c"/>
      <rect x="150" y="162" width="3" height="3" fill="#ffe040"/>
      <rect x="250" y="158" width="3" height="4" fill="#4c9b4c"/>
      <rect x="250" y="155" width="3" height="3" fill="#9050e0"/>
    </g>

    <!-- Zone name -->
    <rect x="120" y="60" width="190" height="30" rx="3" fill="#0d0d0d" opacity="0.75"/>
    <text x="215" y="80" fill="#78c878" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">VERDANT HOLLOW</text>

    <!-- Loading bar -->
    <g transform="translate(80, 170)">
      <rect width="270" height="14" rx="2" fill="#0d0d0d" opacity="0.7"/>
      <rect x="2" y="2" width="266" height="10" fill="#1a1a1a"/>
      <rect x="3" y="3" width="200" height="8" fill="#4c9b4c"/>
      <rect x="3" y="3" width="200" height="4" fill="#78c878" opacity="0.3"/>
      <text x="135" y="10" fill="#f0f0f0" font-family="monospace" font-size="7" text-anchor="middle">75%</text>
    </g>

    <!-- Tip text -->
    <rect x="40" y="190" width="350" height="16" rx="2" fill="#0d0d0d" opacity="0.6"/>
    <text x="215" y="201" fill="#c8c8c8" font-family="monospace" font-size="7" text-anchor="middle">TIP: Gather herbs near rivers for healing potions</text>
  </g>

  <!-- ===== PANEL 2: FROSTPEAK SUMMIT (Ice) - Top Right ===== -->
  <g transform="translate(500, 70)">
    <rect width="430" height="210" rx="4" fill="#0d0d0d" stroke="#90d0f8" stroke-width="2"/>
    <rect x="2" y="2" width="426" height="206" rx="3" fill="#1a2a3a"/>

    <!-- Ice scene -->
    <rect x="2" y="2" width="426" height="140" fill="#3a5a7a"/><!-- cold sky -->
    <rect x="2" y="80" width="426" height="62" fill="#2a4a6a"/>
    <!-- Snow mountains -->
    <g fill="#c8e8ff">
      <polygon points="30,142 90,50 150,142"/>
      <polygon points="120,142 200,40 280,142"/>
      <polygon points="260,142 330,55 400,142"/>
    </g>
    <g fill="#a0c8e0">
      <polygon points="50,142 90,60 130,142"/>
      <polygon points="140,142 200,50 260,142"/>
      <polygon points="280,142 340,65 400,142"/>
    </g>
    <!-- Snow caps -->
    <g fill="#f0f0f0">
      <polygon points="80,60 90,50 100,60"/>
      <polygon points="185,50 200,40 215,50"/>
      <polygon points="320,65 330,55 340,65"/>
    </g>
    <!-- Ground (snow) -->
    <rect x="2" y="140" width="426" height="68" fill="#c8e8ff"/>
    <rect x="2" y="140" width="426" height="3" fill="#f0f0f0"/>
    <!-- Snowflakes -->
    <g fill="#f0f0f0" opacity="0.6">
      <rect x="60" y="30" width="3" height="3"/>
      <rect x="150" y="50" width="2" height="2"/>
      <rect x="250" y="20" width="3" height="3"/>
      <rect x="350" y="40" width="2" height="2"/>
      <rect x="100" y="80" width="2" height="2"/>
      <rect x="300" y="70" width="3" height="3"/>
    </g>
    <!-- Ice crystals -->
    <g fill="#90d0f8" opacity="0.5">
      <polygon points="380,150 385,142 390,150"/>
      <polygon points="50,155 55,148 60,155"/>
    </g>

    <!-- Zone name -->
    <rect x="110" y="60" width="210" height="30" rx="3" fill="#0d0d0d" opacity="0.75"/>
    <text x="215" y="80" fill="#90d0f8" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">FROSTPEAK SUMMIT</text>

    <!-- Loading bar -->
    <g transform="translate(80, 170)">
      <rect width="270" height="14" rx="2" fill="#0d0d0d" opacity="0.7"/>
      <rect x="2" y="2" width="266" height="10" fill="#1a1a1a"/>
      <rect x="3" y="3" width="130" height="8" fill="#50a8e8"/>
      <rect x="3" y="3" width="130" height="4" fill="#90d0f8" opacity="0.3"/>
      <text x="135" y="10" fill="#f0f0f0" font-family="monospace" font-size="7" text-anchor="middle">49%</text>
    </g>

    <!-- Tip text -->
    <rect x="40" y="190" width="350" height="16" rx="2" fill="#0d0d0d" opacity="0.6"/>
    <text x="215" y="201" fill="#c8c8c8" font-family="monospace" font-size="7" text-anchor="middle">TIP: Ice enemies are weak to fire damage spells</text>
  </g>

  <!-- ===== PANEL 3: DRAGONBONE WASTES (Desert) - Bottom Left ===== -->
  <g transform="translate(30, 300)">
    <rect width="430" height="210" rx="4" fill="#0d0d0d" stroke="#d4a85a" stroke-width="2"/>
    <rect x="2" y="2" width="426" height="206" rx="3" fill="#3a2a1a"/>

    <!-- Desert scene -->
    <rect x="2" y="2" width="426" height="140" fill="#c89040"/><!-- warm sky -->
    <rect x="2" y="2" width="426" height="60" fill="#e8a850"/>
    <!-- Sun -->
    <rect x="340" y="15" width="30" height="30" rx="15" fill="#ffe040"/>
    <rect x="344" y="19" width="22" height="22" rx="11" fill="#fff8a0"/>
    <!-- Sand dunes -->
    <g fill="#d4a85a">
      <ellipse cx="100" cy="142" rx="120" ry="30"/>
      <ellipse cx="300" cy="142" rx="140" ry="35"/>
    </g>
    <!-- Ground (sand) -->
    <rect x="2" y="130" width="426" height="78" fill="#d4a85a"/>
    <rect x="2" y="130" width="426" height="3" fill="#e8b870"/>
    <!-- Bones scattered -->
    <g fill="#f0e8d0">
      <rect x="80" y="145" width="20" height="3"/>
      <rect x="85" y="142" width="3" height="8"/>
      <rect x="95" y="142" width="3" height="8"/>
      <rect x="250" y="150" width="15" height="3"/>
      <rect x="260" y="147" width="3" height="9"/>
    </g>
    <!-- Cactus -->
    <g fill="#4c9b4c">
      <rect x="370" y="135" width="6" height="18"/>
      <rect x="364" y="140" width="6" height="4"/>
      <rect x="364" y="136" width="4" height="6"/>
      <rect x="376" y="138" width="6" height="4"/>
      <rect x="378" y="134" width="4" height="6"/>
    </g>

    <!-- Zone name -->
    <rect x="100" y="50" width="230" height="30" rx="3" fill="#0d0d0d" opacity="0.75"/>
    <text x="215" y="70" fill="#e8b800" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">DRAGONBONE WASTES</text>

    <!-- Loading bar -->
    <g transform="translate(80, 170)">
      <rect width="270" height="14" rx="2" fill="#0d0d0d" opacity="0.7"/>
      <rect x="2" y="2" width="266" height="10" fill="#1a1a1a"/>
      <rect x="3" y="3" width="240" height="8" fill="#d4a85a"/>
      <rect x="3" y="3" width="240" height="4" fill="#e8b870" opacity="0.3"/>
      <text x="135" y="10" fill="#f0f0f0" font-family="monospace" font-size="7" text-anchor="middle">91%</text>
    </g>

    <!-- Tip text -->
    <rect x="40" y="190" width="350" height="16" rx="2" fill="#0d0d0d" opacity="0.6"/>
    <text x="215" y="201" fill="#c8c8c8" font-family="monospace" font-size="7" text-anchor="middle">LORE: The dragonbones mark the ancient battlefield of Vaelkyr</text>
  </g>

  <!-- ===== PANEL 4: TWILIGHT CITADEL (Void/Magic) - Bottom Right ===== -->
  <g transform="translate(500, 300)">
    <rect width="430" height="210" rx="4" fill="#0d0d0d" stroke="#9050e0" stroke-width="2"/>
    <rect x="2" y="2" width="426" height="206" rx="3" fill="#1a1030"/>

    <!-- Magic void scene -->
    <rect x="2" y="2" width="426" height="140" fill="#1a0830"/>
    <rect x="2" y="2" width="426" height="50" fill="#0d0420"/>
    <!-- Floating magic particles -->
    <g fill="#d090ff" opacity="0.5">
      <rect x="50" y="30" width="3" height="3"/>
      <rect x="120" y="50" width="4" height="4"/>
      <rect x="200" y="25" width="3" height="3"/>
      <rect x="280" y="60" width="4" height="4"/>
      <rect x="350" y="35" width="3" height="3"/>
      <rect x="380" y="80" width="3" height="3"/>
      <rect x="70" y="90" width="4" height="4"/>
      <rect x="170" y="100" width="3" height="3"/>
      <rect x="310" y="110" width="3" height="3"/>
    </g>
    <!-- Citadel silhouette -->
    <g fill="#2a1850">
      <!-- Main spire -->
      <rect x="180" y="50" width="60" height="90"/>
      <polygon points="190,30 210,10 230,30 240,50 180,50"/>
      <rect x="205" y="0" width="10" height="15"/>
      <!-- Side towers -->
      <rect x="130" y="80" width="50" height="60"/>
      <rect x="125" y="70" width="60" height="14"/>
      <polygon points="145,55 155,45 165,55 170,70 140,70"/>
      <rect x="240" y="80" width="50" height="60"/>
      <rect x="235" y="70" width="60" height="14"/>
      <polygon points="255,55 265,45 275,55 280,70 250,70"/>
      <!-- Glowing windows -->
      <rect x="198" y="70" width="8" height="10" fill="#d090ff" opacity="0.6"/>
      <rect x="214" y="70" width="8" height="10" fill="#d090ff" opacity="0.5"/>
      <rect x="148" y="95" width="6" height="8" fill="#d090ff" opacity="0.4"/>
      <rect x="266" y="95" width="6" height="8" fill="#d090ff" opacity="0.4"/>
    </g>
    <!-- Ground (void) -->
    <rect x="2" y="130" width="426" height="78" fill="#1a0830"/>
    <rect x="2" y="130" width="426" height="3" fill="#2a1850"/>
    <!-- Magic runes on ground -->
    <g fill="#9050e0" opacity="0.3">
      <rect x="60" y="150" width="12" height="12"/>
      <rect x="63" y="153" width="6" height="6" fill="#1a0830"/>
      <rect x="300" y="155" width="12" height="12"/>
      <rect x="303" y="158" width="6" height="6" fill="#1a0830"/>
    </g>

    <!-- Zone name -->
    <rect x="110" y="60" width="210" height="30" rx="3" fill="#0d0d0d" opacity="0.75"/>
    <text x="215" y="80" fill="#d090ff" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">TWILIGHT CITADEL</text>

    <!-- Loading bar -->
    <g transform="translate(80, 170)">
      <rect width="270" height="14" rx="2" fill="#0d0d0d" opacity="0.7"/>
      <rect x="2" y="2" width="266" height="10" fill="#1a1a1a"/>
      <rect x="3" y="3" width="40" height="8" fill="#9050e0"/>
      <rect x="3" y="3" width="40" height="4" fill="#d090ff" opacity="0.3"/>
      <text x="135" y="10" fill="#f0f0f0" font-family="monospace" font-size="7" text-anchor="middle">15%</text>
    </g>

    <!-- Tip text -->
    <rect x="40" y="190" width="350" height="16" rx="2" fill="#0d0d0d" opacity="0.6"/>
    <text x="215" y="201" fill="#c8c8c8" font-family="monospace" font-size="7" text-anchor="middle">TIP: Magic resistance is essential in the Citadel</text>
  </g>

  <!-- === V1.4.0 BADGE === -->
  <g transform="translate(0, 0)">
    <rect width="100" height="30" fill="#e8b800"/>
    <rect x="0" y="27" width="100" height="3" fill="#a87000"/>
    <text x="50" y="19" fill="#0d0d0d" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">v1.4.0</text>
  </g>
</svg>