    <rect width="80" height="26" fill="#e8b800"/>
    <rect x="0" y="23" width="80" height="3" fill="#a87000"/>
    <text x="40" y="17" fill="#0d0d0d" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">v1.4.0</text>
