      <rect x="4" y="4" width="36" height="36" fill="#2a2a4a" stroke="#d42020" stroke-width="2"/>
      <text x="22" y="28" fill="#f0f0f0" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">1</text>
      <rect x="44" y="4" width="36" height="36" fill="#2a2a4a" stroke="#d42020" stroke-width="2"/>
      <text x="62" y="28" fill="#f0f0f0" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">2</text>
      <rect x="84" y="4" width="36" height="36" fill="#2a2a4a" stroke="#d42020" stroke-width="2"/>
      <text x="102" y="28" fill="#f0f0f0" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">3</text>
      <rect x="124" y="4" width="36" height="36" fill="#2a2a4a" stroke="#d42020" stroke-width="2"/>
      <text x="142" y="28" fill="#f0f0f0" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">4</text>
      <rect x="164" y="4" width="36" height="36" fill="#2a2a4a" stroke="#d42020" stroke-width="2"/>
      <text x="182" y="28" fill="#f0f0f0" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">5</text>
      <rect x="210" y="4" width="24" height="36" fill="#2a2a4a" stroke="#50a8e8" stroke-width="1"/>
      <rect x="238" y="4" width="24" height="36" fill="#2a2a4a" stroke="#50a8e8" stroke-width="1"/>
