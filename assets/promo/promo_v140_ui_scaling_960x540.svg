  <!-- === COMPARISON HEADER === -->
  <g transform="translate(230, 0)">
    <rect width="500" height="36" rx="0" fill="#0d0d0d" opacity="0.9"/>
    <rect x="0" y="33" width="500" height="3" fill="#e8b800"/>
    <text x="250" y="22" fill="#e8b800" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">ACCESSIBILITY: UI SCALE COMPARISON</text>
  </g>

  <!-- Arrows between panels -->
