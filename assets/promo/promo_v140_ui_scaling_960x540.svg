<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" style="image-rendering: pixelated;">
  <!-- === BACKGROUND === -->
  <rect width="960" height="540" fill="#0d0d1a"/>

  <!-- === THREE-PANEL COMPARISON === -->

  <!-- Panel dividers -->
  <line x1="320" y1="0" x2="320" y2="540" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="640" y1="0" x2="640" y2="540" stroke="#4a4a5a" stroke-width="2"/>

  <!-- ===== PANEL 1: UI SCALE 1x (Small) ===== -->
  <g transform="translate(0, 0)">
    <!-- Background scene -->
    <rect width="320" height="540" fill="#1a3a1a"/>
    <rect width="320" height="120" fill="#2a5a8a"/>
    <rect y="120" width="320" height="30" fill="#1a4a6a"/>
    <!-- Mountains -->
    <g fill="#0d2e0d" opacity="0.5">
      <polygon points="0,150 40,100 80,150"/>
      <polygon points="60,150 110,90 160,150"/>
      <polygon points="140,150 190,105 240,150"/>
      <polygon points="220,150 270,95 320,150"/>
    </g>
    <!-- Ground -->
    <rect y="150" width="320" height="390" fill="#2d6e2d"/>
    <rect y="150" width="320" height="4" fill="#4c9b4c"/>

    <!-- Player (small) -->
    <g transform="translate(140, 220)">
      <rect x="4" y="20" width="16" height="20" fill="#50a8e8"/>
      <rect x="6" y="6" width="12" height="14" fill="#f8a060"/>
      <rect x="8" y="12" width="3" height="3" fill="#0d0d0d"/>
      <rect x="13" y="12" width="3" height="3" fill="#0d0d0d"/>
      <rect x="4" y="2" width="16" height="6" fill="#6b3a1f"/>
      <rect x="6" y="40" width="5" height="8" fill="#1a4a8a"/>
      <rect x="13" y="40" width="5" height="8" fill="#1a4a8a"/>
    </g>

    <!-- 1x HUD: tiny elements -->
    <!-- HP bar -->
    <g transform="translate(6, 6)">
      <rect width="80" height="10" rx="1" fill="#0d0d0d" opacity="0.8"/>
      <rect x="1" y="1" width="78" height="8" fill="#1a1a1a"/>
      <rect x="2" y="2" width="54" height="6" fill="#d42020"/>
      <text x="60" y="7" fill="#f0f0f0" font-family="monospace" font-size="5">72</text>
    </g>
    <!-- MP bar -->
    <g transform="translate(6, 18)">
      <rect width="80" height="10" rx="1" fill="#0d0d0d" opacity="0.8"/>
      <rect x="1" y="1" width="78" height="8" fill="#1a1a1a"/>
      <rect x="2" y="2" width="64" height="6" fill="#2a7ac0"/>
      <text x="60" y="7" fill="#f0f0f0" font-family="monospace" font-size="5">83</text>
