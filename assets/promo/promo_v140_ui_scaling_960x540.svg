      <rect x="6" y="6" width="12" height="14" fill="#f8a060"/>
      <rect x="8" y="12" width="3" height="3" fill="#0d0d0d"/>
      <rect x="13" y="12" width="3" height="3" fill="#0d0d0d"/>
