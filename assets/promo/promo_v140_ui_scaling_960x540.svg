      <rect x="2" y="2" width="16" height="16" fill="#2a2a4a" stroke="#d42020" stroke-width="1"/>
      <text x="10" y="15" fill="#f0f0f0" font-family="monospace" font-size="8" text-anchor="middle">1</text>
      <rect x="20" y="2" width="16" height="16" fill="#2a2a4a" stroke="#d42020" stroke-width="1"/>
      <text x="28" y="15" fill="#f0f0f0" font-family="monospace" font-size="8" text-anchor="middle">2</text>
      <rect x="38" y="2" width="16" height="16" fill="#2a2a4a" stroke="#d42020" stroke-width="1"/>
      <text x="46" y="15" fill="#f0f0f0" font-family="monospace" font-size="8" text-anchor="middle">3</text>
      <rect x="56" y="2" width="16" height="16" fill="#2a2a4a" stroke="#d42020" stroke-width="1"/>
      <text x="64" y="15" fill="#f0f0f0" font-family="monospace" font-size="8" text-anchor="middle">4</text>
      <rect x="74" y="2" width="16" height="16" fill="#2a2a4a" stroke="#d42020" stroke-width="1"/>
      <text x="82" y="15" fill="#f0f0f0" font-family="monospace" font-size="8" text-anchor="middle">5</text>
