<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" viewBox="0 0 640 200" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Light background -->
  <rect width="640" height="200" fill="#f0f0f5" rx="4"/>

  <!-- P -->
  <g fill="#3080c0">
    <rect x="24" y="40" width="8" height="56"/>
    <rect x="32" y="40" width="16" height="8"/>
    <rect x="48" y="48" width="8" height="16"/>
    <rect x="32" y="64" width="16" height="8"/>
  </g>

  <!-- I -->
  <g fill="#3080c0">
    <rect x="72" y="40" width="24" height="8"/>
    <rect x="80" y="48" width="8" height="40"/>
    <rect x="72" y="88" width="24" height="8"/>
  </g>

  <!-- X -->
  <g fill="#3080c0">
    <rect x="112" y="40" width="8" height="8"/>
    <rect x="136" y="40" width="8" height="8"/>
    <rect x="120" y="48" width="8" height="8"/>
    <rect x="128" y="48" width="8" height="8"/>
    <rect x="128" y="56" width="8" height="8"/>
    <rect x="120" y="56" width="8" height="8"/>
    <rect x="124" y="64" width="8" height="8"/>
    <rect x="120" y="72" width="8" height="8"/>
    <rect x="128" y="72" width="8" height="8"/>
    <rect x="112" y="80" width="8" height="8"/>
    <rect x="136" y="80" width="8" height="8"/>
    <rect x="112" y="88" width="8" height="8"/>
    <rect x="136" y="88" width="8" height="8"/>
  </g>

  <!-- E -->
  <g fill="#3080c0">
    <rect x="160" y="40" width="8" height="56"/>
    <rect x="168" y="40" width="24" height="8"/>
    <rect x="168" y="64" width="16" height="8"/>
    <rect x="168" y="88" width="24" height="8"/>
  </g>

  <!-- L -->
  <g fill="#3080c0">
    <rect x="208" y="40" width="8" height="56"/>
    <rect x="216" y="88" width="24" height="8"/>
  </g>

  <!-- R -->
  <g fill="#cc9900">
    <rect x="264" y="40" width="8" height="56"/>
    <rect x="272" y="40" width="16" height="8"/>
    <rect x="288" y="48" width="8" height="16"/>
    <rect x="272" y="64" width="16" height="8"/>
    <rect x="280" y="72" width="8" height="8"/>
    <rect x="288" y="80" width="8" height="16"/>
