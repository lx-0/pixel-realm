    <rect x="472" y="48" width="8" height="8"/>
    <rect x="496" y="48" width="8" height="8"/>
    <rect x="480" y="56" width="8" height="8"/>
    <rect x="488" y="56" width="8" height="8"/>
  </g>

  <!-- Sword icon -->
  <g fill="#909090">
    <rect x="4" y="56" width="4" height="28"/>
    <rect x="0" y="84" width="12" height="4"/>
    <rect x="4" y="88" width="4" height="8"/>
  </g>
  <rect x="2" y="96" width="8" height="4" fill="#cc9900"/>

  <!-- Shield icon -->
  <g fill="#2060a0">
    <rect x="524" y="52" width="24" height="4"/>
    <rect x="520" y="56" width="32" height="24"/>
    <rect x="524" y="80" width="24" height="4"/>
