  <!-- E -->
  <g fill="#cc9900">
    <rect x="312" y="40" width="8" height="56"/>
    <rect x="320" y="40" width="24" height="8"/>
    <rect x="320" y="64" width="16" height="8"/>
    <rect x="320" y="88" width="24" height="8"/>
  </g>

  <!-- A -->
  <g fill="#cc9900">
    <rect x="368" y="48" width="8" height="48"/>
    <rect x="392" y="48" width="8" height="48"/>
    <rect x="376" y="40" width="16" height="8"/>
    <rect x="376" y="64" width="16" height="8"/>
  </g>

  <!-- L -->
  <g fill="#cc9900">
    <rect x="416" y="40" width="8" height="56"/>
    <rect x="424" y="88" width="24" height="8"/>
