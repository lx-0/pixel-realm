    <rect x="200" y="28" width="4" height="4"/>
    <rect x="340" y="32" width="4" height="4"/>
    <rect x="460" y="28" width="4" height="4"/>
  </g>

  <!-- Subtitle -->
  <text x="280" y="124" fill="#606060" font-family="monospace" font-size="11" text-anchor="middle" letter-spacing="4">PIXELATED  MMORPG  ADVENTURE</text>

  <!-- Bottom line -->
  <g fill="#c0c0c0">
    <rect x="80" y="136" width="400" height="2"/>
  </g>
  <g fill="#cc9900">
    <rect x="276" y="134" width="8" height="6"/>
  </g>
