<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" style="image-rendering: pixelated;">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1a1a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="url(#bgGrad)"/>

  <!-- Decorative pixel grid pattern (subtle) -->
  <g opacity="0.05" fill="#50a8e8">
    <rect x="0" y="0" width="1500" height="500" fill="none" stroke="#50a8e8" stroke-width="0.5" stroke-dasharray="20,20"/>
  </g>

  <!-- Left decorative elements - pixel mountains -->
  <g fill="#1a2040" opacity="0.6">
    <polygon points="0,500 100,300 200,400 300,350 400,500"/>
    <polygon points="50,500 200,280 350,400 450,500"/>
  </g>
  <g fill="#1e2850" opacity="0.4">
    <polygon points="1100,500 1200,320 1300,380 1400,300 1500,500"/>
    <polygon points="1150,500 1300,300 1450,420 1500,500"/>
  </g>

  <!-- Stars / sparkles -->
  <g fill="#fff8a0" filter="url(#glow)" opacity="0.7">
    <rect x="120" y="80" width="4" height="4"/>
    <rect x="280" y="140" width="3" height="3"/>
    <rect x="420" y="60" width="4" height="4"/>
    <rect x="850" y="100" width="3" height="3"/>
    <rect x="1100" y="70" width="4" height="4"/>
    <rect x="1300" y="130" width="3" height="3"/>
    <rect x="1400" y="80" width="4" height="4"/>
    <rect x="680" y="50" width="3" height="3"/>
  </g>

  <!-- Center logo area -->
  <!-- PIXEL in cyan -->
  <g fill="#50a8e8" transform="translate(350, 120) scale(2)">
    <!-- P -->
    <rect x="0" y="0" width="8" height="56"/>
    <rect x="8" y="0" width="16" height="8"/>
    <rect x="24" y="8" width="8" height="16"/>
    <rect x="8" y="24" width="16" height="8"/>
    <!-- I -->
    <rect x="48" y="0" width="24" height="8"/>
    <rect x="56" y="8" width="8" height="40"/>
    <rect x="48" y="48" width="24" height="8"/>
    <!-- X -->
    <rect x="88" y="0" width="8" height="8"/>
    <rect x="112" y="0" width="8" height="8"/>
    <rect x="96" y="8" width="16" height="8"/>
    <rect x="100" y="24" width="8" height="8"/>
    <rect x="96" y="32" width="16" height="8"/>
    <rect x="88" y="40" width="8" height="16"/>
    <rect x="112" y="40" width="8" height="16"/>
    <!-- E -->
    <rect x="136" y="0" width="8" height="56"/>
    <rect x="144" y="0" width="24" height="8"/>
    <rect x="144" y="24" width="16" height="8"/>
    <rect x="144" y="48" width="24" height="8"/>
    <!-- L -->
    <rect x="184" y="0" width="8" height="56"/>
    <rect x="192" y="48" width="24" height="8"/>
  </g>

  <!-- REALM in gold -->
  <g fill="#ffe040" transform="translate(350, 120) scale(2)">
    <!-- R -->
    <rect x="240" y="0" width="8" height="56"/>
    <rect x="248" y="0" width="16" height="8"/>
    <rect x="264" y="8" width="8" height="16"/>
    <rect x="248" y="24" width="16" height="8"/>
    <rect x="256" y="32" width="8" height="8"/>
    <rect x="264" y="40" width="8" height="16"/>
    <!-- E -->
    <rect x="288" y="0" width="8" height="56"/>
    <rect x="296" y="0" width="24" height="8"/>
    <rect x="296" y="24" width="16" height="8"/>
    <rect x="296" y="48" width="24" height="8"/>
    <!-- A -->
    <rect x="344" y="8" width="8" height="48"/>
    <rect x="368" y="8" width="8" height="48"/>
    <rect x="352" y="0" width="16" height="8"/>
    <rect x="352" y="24" width="16" height="8"/>
    <!-- L -->
    <rect x="392" y="0" width="8" height="56"/>
    <rect x="400" y="48" width="24" height="8"/>
    <!-- M -->
    <rect x="440" y="0" width="8" height="56"/>
    <rect x="480" y="0" width="8" height="56"/>
    <rect x="448" y="8" width="8" height="8"/>
    <rect x="472" y="8" width="8" height="8"/>
    <rect x="456" y="16" width="16" height="8"/>
  </g>

  <!-- Subtitle -->
  <text x="750" y="290" fill="#b0b0c0" font-family="monospace" font-size="18" text-anchor="middle" letter-spacing="6">PIXELATED  MMORPG  ADVENTURE</text>

  <!-- Tagline -->
  <text x="750" y="340" fill="#808090" font-family="monospace" font-size="13" text-anchor="middle" letter-spacing="3">A living world that writes new stories every day</text>

  <!-- Bottom bar -->
  <rect x="100" y="400" width="1300" height="2" fill="#404060" opacity="0.5"/>

  <!-- Feature pills -->
  <g font-family="monospace" font-size="11" text-anchor="middle">
    <rect x="250" y="420" width="140" height="28" rx="14" fill="none" stroke="#50a8e8" stroke-width="1" opacity="0.6"/>
    <text x="320" y="438" fill="#50a8e8" opacity="0.8">4 Classes</text>

    <rect x="440" y="420" width="140" height="28" rx="14" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.6"/>
    <text x="510" y="438" fill="#2ecc71" opacity="0.8">19 Biomes</text>

    <rect x="630" y="420" width="160" height="28" rx="14" fill="none" stroke="#ffe040" stroke-width="1" opacity="0.6"/>
    <text x="710" y="438" fill="#ffe040" opacity="0.8">LLM Quests</text>

    <rect x="840" y="420" width="140" height="28" rx="14" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.6"/>
    <text x="910" y="438" fill="#e74c3c" opacity="0.8">PvP Arena</text>

    <rect x="1030" y="420" width="170" height="28" rx="14" fill="none" stroke="#9b59b6" stroke-width="1" opacity="0.6"/>
    <text x="1115" y="438" fill="#9b59b6" opacity="0.8">Player Housing</text>
  </g>

  <!-- Corner decoration -->
  <rect x="20" y="20" width="40" height="4" fill="#50a8e8" opacity="0.3"/>
  <rect x="20" y="20" width="4" height="40" fill="#50a8e8" opacity="0.3"/>
  <rect x="1440" y="20" width="40" height="4" fill="#ffe040" opacity="0.3"/>
  <rect x="1476" y="20" width="4" height="40" fill="#ffe040" opacity="0.3"/>
  <rect x="20" y="476" width="40" height="4" fill="#2ecc71" opacity="0.3"/>
  <rect x="20" y="440" width="4" height="40" fill="#2ecc71" opacity="0.3"/>
  <rect x="1440" y="476" width="40" height="4" fill="#9b59b6" opacity="0.3"/>
  <rect x="1476" y="440" width="4" height="40" fill="#9b59b6" opacity="0.3"/>
</svg>