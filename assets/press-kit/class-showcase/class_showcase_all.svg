      <rect x="10" y="8" width="32" height="32" fill="#3a3a50" rx="2"/>
      <!-- Axe icon -->
      <rect x="24" y="10" width="4" height="28" fill="#bdc3c7"/>
      <rect x="14" y="12" width="12" height="8" fill="#e74c3c"/>
      <rect x="30" y="12" width="12" height="8" fill="#e74c3c"/>
      <text x="54" y="24" fill="#ff6040" font-family="monospace" font-size="10" font-weight="bold">Berserker</text>
      <text x="54" y="38" fill="#909090" font-family="monospace" font-size="7">DPS · Rage attacks</text>
    </g>

    <!-- Paladin -->
