    <!-- Class description -->
    <text x="105" y="168" fill="#e0e0e0" font-family="monospace" font-size="9" text-anchor="middle">Frontline fighter.</text>
    <text x="105" y="180" fill="#e0e0e0" font-family="monospace" font-size="9" text-anchor="middle">Heavy armor, melee damage.</text>

    <!-- Archetype separator -->
    <rect x="20" y="192" width="170" height="1" fill="#e74c3c" opacity="0.5"/>
    <text x="105" y="207" fill="#e74c3c" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="2">ARCHETYPES</text>

    <!-- Guardian -->
    <g transform="translate(15, 218)">
      <rect width="180" height="52" rx="3" fill="#251520" stroke="#555" stroke-width="0.5"/>
