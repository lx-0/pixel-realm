<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" style="image-rendering: pixelated;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="480" y="44" fill="#ffe040" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="6">CHOOSE YOUR CLASS</text>
  <rect x="180" y="54" width="600" height="2" fill="#ffe040" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="480" y="72" fill="#808090" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="3">4 CLASSES  ·  12 ARCHETYPES  ·  INFINITE BUILDS</text>

  <!-- ===== WARRIOR COLUMN (x=30) ===== -->
  <g transform="translate(30, 90)">
    <!-- Class card background -->
    <rect width="210" height="420" rx="4" fill="#1e1e30" stroke="#c0392b" stroke-width="2" opacity="0.9"/>

    <!-- Class header -->
    <rect width="210" height="36" rx="4" fill="#c0392b" opacity="0.8"/>
    <text x="105" y="24" fill="#ffffff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="3">WARRIOR</text>

    <!-- Portrait area -->
    <rect x="55" y="48" width="100" height="100" fill="#2a1520" stroke="#e74c3c" stroke-width="1" rx="2"/>
