      <rect x="10" y="8" width="32" height="32" fill="#3a3a50" rx="2"/>
      <rect x="18" y="14" width="16" height="4" fill="#3498db"/>
      <rect x="14" y="18" width="24" height="14" fill="#3498db"/>
      <rect x="18" y="32" width="16" height="4" fill="#3498db"/>
      <rect x="22" y="36" width="8" height="2" fill="#3498db"/>
      <text x="54" y="24" fill="#60c0ff" font-family="monospace" font-size="10" font-weight="bold">Guardian</text>
      <text x="54" y="38" fill="#909090" font-family="monospace" font-size="7">Tank · Shield wall</text>
    </g>

    <!-- Berserker -->
