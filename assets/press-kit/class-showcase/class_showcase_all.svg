    <g transform="translate(55, 48)">
      <!-- Helmet -->
      <rect x="30" y="5" width="40" height="10" fill="#a0a0a0"/>
      <rect x="20" y="15" width="60" height="5" fill="#808080"/>
      <!-- Face -->
      <rect x="30" y="20" width="40" height="25" fill="#deb887"/>
      <rect x="35" y="25" width="10" height="5" fill="#2c3e50"/>
      <rect x="55" y="25" width="10" height="5" fill="#2c3e50"/>
      <rect x="40" y="35" width="20" height="5" fill="#c0392b"/>
      <!-- Armor -->
      <rect x="20" y="45" width="60" height="30" fill="#7f8c8d"/>
      <rect x="40" y="50" width="20" height="10" fill="#e74c3c"/>
      <!-- Sword -->
      <rect x="85" y="30" width="5" height="40" fill="#bdc3c7"/>
      <rect x="80" y="28" width="15" height="4" fill="#8e6c2e"/>
