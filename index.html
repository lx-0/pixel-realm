<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>PixelRealm</title>
    <meta name="description" content="PixelRealm — a browser-based pixelated MMORPG with LLM-generated quests, characters, and world events. Play free in your browser." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PixelRealm" />
    <meta property="og:description" content="A browser-based pixelated MMORPG with LLM-generated quests, characters, and world events. Play free in your browser." />
    <meta property="og:image" content="./assets/promo/twitter_card_1200x675.svg" />
    <meta property="og:url" content="https://pixelforgestudios.itch.io/pixelrealm" />
    <meta property="og:site_name" content="PixelRealm" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PixelRealm" />
    <meta name="twitter:description" content="A browser-based pixelated MMORPG with LLM-generated quests, characters, and world events. Play free in your browser." />
    <meta name="twitter:image" content="./assets/promo/twitter_card_1200x675.svg" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        background: #0a0a0a;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;          /* prevent browser pan/zoom on touch */
        -webkit-user-select: none;
        user-select: none;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game-container {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        /* Ensure the canvas fills available space on mobile */
        max-width: 100vw;
        max-height: 100vh;
      }
      /* Prevent iOS rubber-band scroll that breaks touch input */
      canvas {
        display: block;
        touch-action: none;
      }
      /* Visually-hidden skip link — visible only on focus for keyboard users */
      .sr-skip-link {
        position: absolute;
        top: -9999px;
        left: -9999px;
        z-index: 9999;
        background: #0a0a2e;
        color: #ffd700;
        padding: 4px 8px;
        font-family: monospace;
        font-size: 14px;
        text-decoration: none;
        border: 1px solid #50a8e8;
      }
      .sr-skip-link:focus {
        top: 4px;
        left: 4px;
      }
    </style>
  </head>
  <body>
    <!--
      Screen reader skip link — hidden visually but available to assistive tech.
      Points to the game canvas region.
    -->
    <a href="#game-container" class="sr-skip-link">Skip to game</a>

    <!--
      Main game container. role="application" signals that keyboard interactions
      are handled by the application, not the browser. aria-label names the region.
    -->
    <div
      id="game-container"
      role="application"
      aria-label="PixelRealm game canvas"
    ></div>

    <!--
      Live region for important in-game announcements (quest complete, level up, etc.)
      Populated by JS when accessibility mode is active.
    -->
    <div
      id="game-announcer"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      style="position:absolute;width:1px;height:1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;"
    ></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
