<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>PixelRealm</title>
    <meta name="description" content="PixelRealm — a browser-based pixelated MMORPG with LLM-generated quests, characters, and world events. Play free in your browser." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PixelRealm" />
    <meta property="og:description" content="A browser-based pixelated MMORPG with LLM-generated quests, characters, and world events. Play free in your browser." />
    <meta property="og:image" content="./assets/promo/twitter_card_1200x675.svg" />
    <meta property="og:url" content="https://pixelforgestudios.itch.io/pixelrealm" />
    <meta property="og:site_name" content="PixelRealm" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PixelRealm" />
    <meta name="twitter:description" content="A browser-based pixelated MMORPG with LLM-generated quests, characters, and world events. Play free in your browser." />
    <meta name="twitter:image" content="./assets/promo/twitter_card_1200x675.svg" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        background: #0a0a0a;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;          /* prevent browser pan/zoom on touch */
        -webkit-user-select: none;
        user-select: none;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game-container {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        /* Ensure the canvas fills available space on mobile */
        max-width: 100vw;
        max-height: 100vh;
      }
      /* Prevent iOS rubber-band scroll that breaks touch input */
      canvas {
        display: block;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
