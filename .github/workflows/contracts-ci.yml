name: Contracts CI

on:
  push:
    branches: [main, "feat/pix-155*"]
    paths: ["contracts/**"]
  pull_request:
    paths: ["contracts/**"]

env:
  # Use the free public Base Sepolia RPC for fork tests; override via secret for
  # deployments.
  BASE_SEPOLIA_RPC_URL: https://sepolia.base.org

jobs:
  # ── 1. Build + unit tests ────────────────────────────────────────────────────
  forge-test:
    name: Forge test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        working-directory: contracts
        run: forge install

      - name: Build
        working-directory: contracts
        run: forge build --sizes

      - name: Run tests (unit + fuzz)
        working-directory: contracts
        run: forge test -vvv

      - name: Gas report
        working-directory: contracts
        run: forge test --gas-report

  # ── 2. Slither static analysis (mandatory pre-deploy gate) ───────────────────
  slither:
    name: Slither analysis
    runs-on: ubuntu-latest
    # Fail the whole workflow if Slither reports HIGH or MEDIUM issues.
    # Informational/low findings produce a warning only (--fail-high).

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        working-directory: contracts
        run: forge install

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-args: >-
            --filter-paths "lib/"
            --fail-high
          solc-version: "0.8.24"

  # ── 3. Deploy to Base Sepolia (manual trigger / main only) ───────────────────
  deploy-base-sepolia:
    name: Deploy to Base Sepolia
    runs-on: ubuntu-latest
    needs: [forge-test, slither]
    # Only run on manual dispatch or when a deploy tag is pushed.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/deploy/'))
    environment: base-sepolia

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        working-directory: contracts
        run: forge install

      - name: Deploy contracts
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ADMIN_ADDRESS:        ${{ secrets.ADMIN_ADDRESS }}
          MINTER_ADDRESS:       ${{ secrets.MINTER_ADDRESS }}
          UPGRADER_ADDRESS:     ${{ secrets.UPGRADER_ADDRESS }}
          TREASURY_ADDRESS:     ${{ secrets.TREASURY_ADDRESS }}
          ITEMS_BASE_URI:       ${{ vars.ITEMS_BASE_URI }}
          LAND_BASE_URI:        ${{ vars.LAND_BASE_URI }}
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          BASESCAN_API_KEY:     ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge script script/Deploy.s.sol \
            --rpc-url base_sepolia \
            --broadcast \
            --verify \
            --etherscan-api-key "$BASESCAN_API_KEY" \
            -vvvv
