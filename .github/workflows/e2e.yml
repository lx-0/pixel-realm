name: E2E Smoke Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

# Cancel in-progress runs on the same branch to save CI minutes
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Client smoke tests (no backend required) ──────────────────────────────
  smoke-client:
    name: Smoke — client (Vite only)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run client smoke tests
        run: npm run test:e2e -- --project=client
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-client
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots-client
          path: test-results/
          retention-days: 3

  # ── Full-stack smoke tests (auth server + Colyseus + DB + Redis) ──────────
  smoke-fullstack:
    name: Smoke — full stack (auth + game server)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pixelrealm
          POSTGRES_USER: pixelrealm
          POSTGRES_PASSWORD: pixelrealm_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pixelrealm -d pixelrealm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Build server
        run: npm run build
        working-directory: server
        env:
          NODE_ENV: test

      - name: Run DB migrations
        run: npm run db:migrate
        working-directory: server
        env:
          DATABASE_URL: postgresql://pixelrealm:pixelrealm_dev@localhost:5432/pixelrealm
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-secret-not-for-production
          NODE_ENV: test

      - name: Start auth server (background)
        run: |
          node dist/index.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for auth port to be ready
          for i in {1..20}; do
            nc -z localhost 3001 && echo "Auth server ready" && break
            sleep 1
          done
        working-directory: server
        env:
          DATABASE_URL: postgresql://pixelrealm:pixelrealm_dev@localhost:5432/pixelrealm
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-secret-not-for-production
          NODE_ENV: test
          PORT: 2567
          AUTH_PORT: 3001

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full-stack smoke tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_AUTH_URL: http://localhost:3001

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-fullstack
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots-fullstack
          path: test-results/
          retention-days: 3
